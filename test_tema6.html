<style>

:root{--bg:#fff;--sf:#f8f8f8;--br:#e4e4e4;--tx:#111;--mx:#777;--r:8px;--tr:160ms ease;

<script>
const ALL=[{"text": "¿Cómo se define formalmente un grafo G?", "options": [{"text": "G = (V, A), donde V es un conjunto no vacío de vértices y A es un conjunto de aristas (pares de vértices)", "c": true}, {"text": "G = (N, E), donde N son los nodos con pesos y E son las etiquetas de las aristas", "c": false}, {"text": "G = (V, A, P), donde V son vértices, A aristas y P pesos obligatorios", "c": false}, {"text": "G = (R, S), donde R es la raíz y S son los subgrafos", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es la diferencia entre grafo dirigido y no dirigido?", "options": [{"text": "En el no dirigido (v,w)=(w,v); en el dirigido ⟨v,w⟩≠⟨w,v⟩ (las aristas tienen sentido)", "c": true}, {"text": "En el dirigido los nodos tienen pesos; en el no dirigido las aristas los tienen", "c": false}, {"text": "En el no dirigido puede haber ciclos; en el dirigido no", "c": false}, {"text": "En el dirigido todos los nodos tienen el mismo grado de salida", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué es un grafo etiquetado o con pesos?", "options": [{"text": "Un grafo G=(V,A,W) donde W:A→TipoEtiqueta asigna un valor a cada arista", "c": true}, {"text": "Un grafo donde cada vértice tiene un nombre único", "c": false}, {"text": "Un grafo donde las aristas están ordenadas por peso ascendente", "c": false}, {"text": "Un grafo donde los pesos representan el número de vértices adyacentes", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué es un camino en un grafo?", "options": [{"text": "Secuencia de vértices w₁,w₂,...,wₙ tal que todas las aristas (wᵢ,wᵢ₊₁) pertenecen a A", "c": true}, {"text": "Cualquier subconjunto de aristas del grafo", "c": false}, {"text": "La arista de menor coste entre dos vértices", "c": false}, {"text": "Un recorrido que visita todos los vértices exactamente una vez", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué es la longitud de un camino?", "options": [{"text": "El número de aristas del camino (número de nodos menos 1)", "c": true}, {"text": "La suma de los pesos de las aristas del camino", "c": false}, {"text": "El número de nodos distintos del camino", "c": false}, {"text": "La distancia euclidiana entre el origen y el destino", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué es un ciclo en un grafo?", "options": [{"text": "Camino en el que el primer y el último vértice son iguales", "c": true}, {"text": "Camino que pasa por todos los vértices del grafo", "c": false}, {"text": "Arista que conecta un nodo consigo mismo (bucle)", "c": false}, {"text": "Camino de longitud máxima entre dos vértices", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuándo se dice que un grafo es CONEXO?", "options": [{"text": "Cuando existe un camino entre cualquier par de vértices", "c": true}, {"text": "Cuando tiene exactamente un ciclo simple", "c": false}, {"text": "Cuando todos los vértices tienen el mismo grado", "c": false}, {"text": "Cuando es un árbol de expansión de otro grafo mayor", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué es el GRADO de un vértice v en un grafo no dirigido?", "options": [{"text": "El número de aristas que inciden en v", "c": true}, {"text": "El número de vértices adyacentes a los que v apunta", "c": false}, {"text": "La longitud del camino más corto desde v a cualquier otro vértice", "c": false}, {"text": "El número de ciclos que pasan por v", "c": false}], "d": 1, "t": 6}, {"text": "En un grafo DIRIGIDO, ¿qué es el grado de ENTRADA de v?", "options": [{"text": "El número de aristas ⟨x,v⟩ (aristas que llegan a v)", "c": true}, {"text": "El número de aristas ⟨v,x⟩ (aristas que salen de v)", "c": false}, {"text": "El número total de aristas que inciden en v", "c": false}, {"text": "La suma del grado de entrada y de salida de v", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuántas aristas tiene un grafo NO DIRIGIDO completo con n nodos?", "options": [{"text": "n(n-1)/2", "c": true}, {"text": "n(n-1)", "c": false}, {"text": "n²", "c": false}, {"text": "2n-1", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuántas aristas tiene un grafo DIRIGIDO completo con n nodos?", "options": [{"text": "n(n-1)", "c": true}, {"text": "n(n-1)/2", "c": false}, {"text": "n²", "c": false}, {"text": "2n", "c": false}], "d": 1, "t": 6}, {"text": "¿Cómo se representa un grafo con MATRIZ DE ADYACENCIA?", "options": [{"text": "Matriz M[v,w]=true si existe la arista (v,w); para grafos etiquetados M[v,w]=etiqueta", "c": true}, {"text": "Array de listas donde cada posición i almacena los vecinos del nodo i", "c": false}, {"text": "Árbol binario de búsqueda indexado por número de nodo", "c": false}, {"text": "Tabla hash donde la clave es la arista y el valor es su peso", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es la ventaja de la matriz de adyacencia?", "options": [{"text": "Representación sencilla y acceso en O(1) a una arista concreta", "c": true}, {"text": "Uso eficiente de memoria cuando hay pocas aristas (grafo disperso)", "c": false}, {"text": "El número de nodos puede cambiar dinámicamente", "c": false}, {"text": "Es más rápida para calcular el número total de aristas", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es el inconveniente de la matriz de adyacencia?", "options": [{"text": "Para grafos dispersos (pocas aristas) se desperdicia mucha memoria: O(n²)", "c": true}, {"text": "El acceso a una arista concreta es O(n) en lugar de O(1)", "c": false}, {"text": "No puede representar grafos etiquetados con pesos", "c": false}, {"text": "Solo funciona para grafos no dirigidos", "c": false}], "d": 1, "t": 6}, {"text": "¿Cómo se representan los grafos con LISTAS DE ADYACENCIA?", "options": [{"text": "Array de n listas donde R[v] contiene los w tales que (v,w) pertenece a A", "c": true}, {"text": "Matriz cuadrada de booleanos de n×n", "c": false}, {"text": "Lista de todas las aristas del grafo ordenadas por peso", "c": false}, {"text": "Árbol donde los nodos representan aristas del grafo", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuánta memoria usa la representación con listas de adyacencia?", "options": [{"text": "O(n + a) donde n es el número de nodos y a el número de aristas", "c": true}, {"text": "O(n²) siempre", "c": false}, {"text": "O(a²) proporcional al cuadrado de las aristas", "c": false}, {"text": "O(n·a) producto del número de nodos y aristas", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuándo conviene usar listas de adyacencia frente a matrices?", "options": [{"text": "Cuando a << n² (grafo disperso con pocas aristas)", "c": true}, {"text": "Cuando a ≈ n² (grafo denso con muchas aristas)", "c": false}, {"text": "Siempre, porque las listas siempre son más eficientes", "c": false}, {"text": "Solo para grafos no dirigidos sin pesos", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es el inconveniente de las listas de adyacencia?", "options": [{"text": "Es ineficiente para encontrar las aristas que LLEGAN a un nodo (grado de entrada)", "c": true}, {"text": "El acceso a un vecino concreto es O(n²)", "c": false}, {"text": "No puede representar grafos dirigidos", "c": false}, {"text": "Requiere que los vértices estén numerados consecutivamente", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué estructura usa la búsqueda primero en PROFUNDIDAD (BPP)?", "options": [{"text": "Una pila (explícita o mediante recursividad)", "c": true}, {"text": "Una cola", "c": false}, {"text": "Un montículo (heap)", "c": false}, {"text": "Un árbol de expansión explícito", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es la idea de la búsqueda primero en PROFUNDIDAD?", "options": [{"text": "Explorar hasta llegar a una hoja antes de retroceder; equivalente al preorden en árboles", "c": true}, {"text": "Visitar todos los vértices nivel por nivel", "c": false}, {"text": "Seleccionar siempre el vértice más cercano no visitado", "c": false}, {"text": "Visitar los vértices por orden de grado decreciente", "c": false}], "d": 1, "t": 6}, {"text": "¿Qué estructura usa la búsqueda primero en ANCHURA (BPA)?", "options": [{"text": "Una cola para visitar los vértices nivel por nivel", "c": true}, {"text": "Una pila para explorar en profundidad", "c": false}, {"text": "Un montículo para seleccionar el vértice de menor peso", "c": false}, {"text": "Una tabla de marcas booleanas sin estructura auxiliar", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es la complejidad de BPP y BPA con MATRICES de adyacencia?", "options": [{"text": "O(n²) — por cada nodo hay que recorrer toda la fila de la matriz", "c": true}, {"text": "O(n + a)", "c": false}, {"text": "O(a log n)", "c": false}, {"text": "O(n log n)", "c": false}], "d": 1, "t": 6}, {"text": "¿Cuál es la complejidad de BPP y BPA con LISTAS de adyacencia?", "options": [{"text": "O(n + a) — proporcional al número de nodos y aristas", "c": true}, {"text": "O(n²)", "c": false}, {"text": "O(a log a)", "c": false}, {"text": "O(n·a)", "c": false}], "d": 1, "t": 6}, {"text": "¿Cómo se detectan los componentes conexos de un grafo no dirigido?", "options": [{"text": "Con BPP o BPA: cada llamada inicial a bpp(v) visita un componente conexo distinto", "c": true}, {"text": "Calculando los ciclos del grafo y contando los nodos en cada ciclo", "c": false}, {"text": "Con el algoritmo de Dijkstra desde todos los nodos", "c": false}, {"text": "Comprobando si la matriz de adyacencia es simétrica", "c": false}], "d": 1, "t": 6}, {"text": "¿Cómo se detecta si un grafo NO DIRIGIDO tiene algún ciclo?", "options": [{"text": "Con BPP: existe ciclo si y solo si aparece algún arco que no es del árbol de expansión", "c": true}, {"text": "Con BPP: existe ciclo si y solo si aparece algún arco de retroceso", "c": false}, {"text": "Con BPA: existe ciclo si un nodo es visitado más de una vez", "c": false}, {"text": "Comprobando si el número de aristas es mayor que n-1", "c": false}], "d": 1, "t": 6}, {"text": "¿Cómo se detecta si un grafo DIRIGIDO tiene algún ciclo?", "options": [{"text": "Con BPP: existe ciclo si y solo si aparece algún arco de RETROCESO", "c": true}, {"text": "Con BPP: existe ciclo si aparece cualquier arco que no sea del ár const QUIZ_TITLE="Grafos: Conceptos y Algoritmos";

const AC=window.AudioContext||window.webkitAudioContext;let _ax=null;
function ga(){if(!_ax)_ax=new AC();return _ax;}
function beep(f,d){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.14,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const LB=['A','B','C','D'];
let qs=[],cur=0,ans=[];

function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function start(pool){
  pool=pool||ALL;
  qs=sh(pool).map(q=>({...q,options:sh(q.options)}));
  ans=new Array(qs.length).fill(null);
  cur=0;
  document.getElementById('res').style.display='none';
  document.getElementById('review').style.display='none';
  const qd=document.getElementById('quiz');
  qd.querySelectorAll('.card').forEach(c=>c.remove());
  qd.style.display='block';
  qs.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='card'+(qi===0?' on':'');
    card.id='c'+qi;
    let extra='';
    if(q.code)extra=`<div class="code">${q.code}</div>`;
    card.innerHTML=`<div class="qt">${q.text}</div>${extra}
<div class="opts" id="o${qi}">${q.options.map((op,oi)=>
  `<div class="opt" onclick="pick(${qi},${oi})" id="op${qi}_${oi}">
   <span class="ol">${LB[oi]}</span><span class="ot">${op.text}</span></div>`).join('')}
</div><div class="fb" id="fb${qi}"></div>
<div class="nav">
  <button class="btn" onclick="go(-1)"${qi===0?' disabled':''}>Anterior</button>
  <span class="pg">${qi+1} / ${qs.length}</span>
  <button class="btn pr" onclick="go(1)">${qi===qs.length-1?'Ver resultado':'Siguiente'}</button>
</div>`;
    qd.appendChild(card);
  });
  show(0);
}

function show(i){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c'+i);if(c){c.classList.add('on');cur=i;}
  document.getElementById('qc').textContent=`Pregunta ${i+1} de ${qs.length}`;
  document.getElementById('pb').style.width=((i+1)/qs.length*100)+'%';
}

function go(d){const n=cur+d;if(n<0)return;if(n>=qs.length){showRes();return;}show(n);}

function pick(qi,oi){
  if(ans[qi]!==null)return;
  ans[qi]=oi;
  const ci=qs[qi].options.findIndex(o=>o.c);
  if(oi===ci)beep(880,.3);else beep(240,.38);
  qs[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`op${qi}_${i}`);
    el.classList.add('done');
    if(i===ci)el.classList.add('ok');
    else if(i===oi)el.classList.add('ng');
    else el.classList.add('dim');
  });
  if(qs[qi].exp){const fb=document.getElementById('fb'+qi);fb.textContent=qs[qi].exp;fb.classList.add('on');}
}

function calcScore(){
  let ok=0,ng=0,sk=0;
  ans.forEach((a,i)=>{if(a===null){sk++;return;}const ci=qs[i].options.findIndex(o=>o.c);if(a===ci)ok++;else ng++;});
  return{ok,ng,sk,tot:qs.length,pct:Math.round(ok/qs.length*100)};
}

function showRes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('review').style.display='none';
  document.getElementById('res').style.display='block';
  const{ok,ng,sk,tot,pct}=calcScore();
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('sok').textContent=ok;
  document.getElementById('sng').textContent=ng;
  document.getElementById('sskip').textContent=sk;
  const desc=pct>=90?'¡Excelente! Dominas el tema.':pct>=70?'Buen resultado. Repasa los fallos.':pct>=50?'Aprobado justo. Sigue repasando.':'Hay que estudiar más. ¡Tú puedes!';
  document.getElementById('rdesc').textContent=desc;
  setTimeout(()=>{document.getElementById('sc').style.strokeDashoffset=326.7-(pct/100)*326.7;},120);
  document.getElementById('pb').style.width='100%';
}

function backToResults(){document.getElementById('review').style.display='none';document.getElementById('res').style.display='block';}

function startReview(){
  document.getElementById('res').style.display='none';
  document.getElementById('review').style.display='block';
  const body=document.getElementById('rev-body');
  body.innerHTML='';
  qs.forEach((q,qi)=>{
    const ci=q.options.findIndex(o=>o.c),ua=ans[qi];
    const st=ua===null?'sk':ua===ci?'ok':'ng';
    const bl=st==='ok'?'✓ Correcta':st==='ng'?'✗ Incorrecta':'Sin responder';
    let h=`<div class="rq">
<div class="rq-num">Pregunta ${qi+1} <span class="badge ${st}">${bl}</span></div>
<div class="rq-text">${q.text}</div>`;
    if(q.code)h+=`<div class="code">${q.code}</div>`;
    q.options.forEach((op,oi)=>{
      const cls=oi===ci?' ok':oi===ua?' ng':'';
      const mk=oi===ci?' ✓':oi===ua?' ✗':'';
      h+=`<div class="rq-opt${cls}"><span style="font-weight:700;min-width:20px">${LB[oi]})</span><span>${op.text}${mk}</span></div>`;
    });
    if(q.exp)h+=`<div class="rq-exp">💡 ${q.exp}</div>`;
    h+='</div>';
    body.innerHTML+=h;
  });
  window.scrollTo(0,0);
}

function exportPDF(){
  const{ok,tot,pct}=calcScore();
  let h=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Revisión</title><style>
body{font-family:Arial,sans-serif;font-size:11.5pt;color:#111;max-width:680px;margin:36px auto;padding:0 18px}
h1{font-size:16pt;margin-bottom:3px}
.meta{color:#555;font-size:10pt;margin-bottom:22px;padding-bottom:10px;border-bottom:1px solid #ddd}
.q{margin-bottom:18px;padding:10px 12px;border:1px solid #ddd;border-radius:6px;page-break-inside:avoid}
.qn{font-size:8.5pt;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.qt{font-weight:600;margin-bottom:7px;line-height:1.5}
.qcode{background:#f5f5f5;border:1px solid #ddd;padding:7px 9px;font-family:Consolas,monospace;font-size:9.5pt;margin-bottom:7px;white-space:pre-wrap}
.op{padding:2px 5px;margin-bottom:2px;border-radius:3px;font-size:10.5pt;line-height:1.4}
.op.ok{background:#f0fdf4;color:#166534;font-weight:600}
.op.ng{background:#fef2f2;color:#991b1b;font-weight:600}
.exp{margin-top:5px;font-size:9pt;color:#555;padding:4px 7px;border-left:3px solid #ddd}
@page{margin:1.5cm}
</style></head><body>
<h1>${QUIZ_TITLE}</h1>
<div class="meta">Resultado: ${ok}/${tot} correctas · ${pct}% · Revisión completa</div>`;
  qs.forEach((q,qi)=>{
    const ci=q.options.findIndex(o=>o.c),ua=ans[qi];
    const st=ua===null?'Sin responder':ua===ci?'✓ Correcta':'✗ Incorrecta';
    h+=`<div class="q"><div class="qn">Pregunta ${qi+1} — ${st}</div><div class="qt">${q.text}</div>`;
    if(q.code)h+=`<div class="qcode">${q.code}</div>`;
    q.options.forEach((op,oi)=>{
      const cls=oi===ci?' ok':oi===ua?' ng':'';
      const mk=oi===ci?' ✓':oi===ua?' ✗':'';
      h+=`<div class="op${cls}">${LB[oi]}) ${op.text}${mk}</div>`;
    });
    if(q.exp)h+=`<div class="exp">💡 ${q.exp}</div>`;
    h+='</div>';
  });
  h+='</body></html>';
  const w=window.open('','_blank');
  w.document.write(h);w.document.close();
  setTimeout(()=>w.print(),450);
}

start();
</script>
</body></html>
