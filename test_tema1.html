<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Introducción a los TADs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--sf:#f7f7f7;--br:#e4e4e4;--tx:#111;--mx:#666;--ac:#111;--r:8px;--tr:180ms ease}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
#pb{position:fixed;top:0;left:0;height:3px;background:var(--ac);transition:width 400ms ease;z-index:100}
header{padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--br);max-width:740px;margin:0 auto;width:100%}
.sub{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mx);margin-bottom:.4rem}
h1{font-size:1.55rem;font-weight:700;letter-spacing:-.02em}
.bk{display:inline-block;margin-top:.6rem;font-size:.75rem;color:var(--mx);text-decoration:none;letter-spacing:.05em;text-transform:uppercase}
.bk:hover{color:var(--tx)}
main{max-width:740px;margin:0 auto;width:100%;padding:2rem;flex:1}
.qc{font-size:.78rem;color:var(--mx);letter-spacing:.04em;margin-bottom:1.4rem}
.card{display:none;animation:fi 220ms ease}
.card.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qt{font-size:1rem;line-height:1.7;font-weight:500;margin-bottom:1.4rem}
.code{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:.9rem 1rem;font-family:'Fira Code',Consolas,monospace;font-size:.82rem;margin-bottom:1.1rem;line-height:1.55;overflow-x:auto;white-space:pre}
.opts{display:flex;flex-direction:column;gap:.55rem}
.opt{display:flex;align-items:flex-start;gap:.9rem;padding:.85rem 1rem;border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:background var(--tr),border-color var(--tr)}
.opt:hover:not(.done){background:var(--sf);border-color:#bbb}
.ol{font-size:.72rem;font-weight:700;letter-spacing:.05em;min-width:16px;color:var(--mx);padding-top:2px}
.ot{font-size:.92rem;line-height:1.5}
.opt.ok{background:var(--ac);border-color:var(--ac);color:#fff}
.opt.ok .ol{color:rgba(255,255,255,.65)}
.opt.bad{background:#777;border-color:#777;color:#fff;opacity:.85}
.opt.bad .ol{color:rgba(255,255,255,.65)}
.opt.dim{opacity:.3;cursor:default}
.opt.done{cursor:default}
.fb{display:none;margin-top:.9rem;font-size:.83rem;color:var(--mx);line-height:1.55;padding:.75rem 1rem;border-left:3px solid var(--br)}
.fb.on{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--br)}
.pg{font-size:.78rem;color:var(--mx)}
.btn{padding:.55rem 1.3rem;font-size:.85rem;font-weight:600;border:1px solid var(--ac);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--tx);transition:background var(--tr),color var(--tr);letter-spacing:.02em}
.btn:hover{background:var(--ac);color:#fff}
.btn.pr{background:var(--ac);color:#fff}
.btn.pr:hover{opacity:.8}
.btn:disabled{opacity:.28;cursor:default}
.btn:disabled:hover{background:transparent;color:var(--tx)}
#res{display:none;text-align:center;padding:3rem 0;animation:fi 400ms ease}
.ring{width:130px;height:130px;margin:0 auto 1.8rem}
.ring svg{transform:rotate(-90deg)}
.pct{font-size:2.4rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.25rem}
.desc{font-size:.88rem;color:var(--mx);margin-bottom:2.2rem}
.stats{display:flex;justify-content:center;gap:2rem;margin-bottom:2.2rem;font-size:.83rem}
.sv{font-size:1.35rem;font-weight:700;display:block}
.sl{color:var(--mx)}
</style>
</head>
<body>
<div id="pb" style="width:0%"></div>
<header>
  <div class="sub">Estructuras de Datos — Tema 1</div>
  <h1>Introducción a los TADs</h1>
  <a class="bk" href="index.html">← Índice</a>
</header>
<main>
  <div id="quiz">
    <div class="qc" id="qc">Pregunta 1 de N</div>
  </div>
  <div id="res">
    <div class="ring">
      <svg viewBox="0 0 120 120" width="130" height="130">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#e8e8e8" stroke-width="9"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="#111" stroke-width="9"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"
          id="sc" stroke-linecap="round" style="transition:stroke-dashoffset 1.1s ease"/>
      </svg>
    </div>
    <div class="pct" id="pct">0%</div>
    <div class="desc" id="rdesc">—</div>
    <div class="stats">
      <div><span class="sv" id="sok">0</span><span class="sl">Correctas</span></div>
      <div><span class="sv" id="sng">0</span><span class="sl">Incorrectas</span></div>
      <div><span class="sv" id="stot">0</span><span class="sl">Total</span></div>
    </div>
    <button class="btn pr" onclick="start()">Repetir test</button><br>
    <a class="bk" href="index.html" style="margin-top:1rem">← Índice</a>
  </div>
</main>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ax=null;
function ga(){if(!ax)ax=new AC();return ax;}
function beep(f,d){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const ALL=[{"text": "¿Qué es un programa según la teoría?", "options": [{"text": "Algoritmos + Estructuras de datos", "c": true}, {"text": "Solo algoritmos eficientes", "c": false}, {"text": "Una colección de instrucciones de bajo nivel", "c": false}, {"text": "Un conjunto de funciones con tipos primitivos", "c": false}]}, {"text": "¿Qué es un algoritmo?", "options": [{"text": "Conjunto de reglas finito y no ambiguo", "c": true}, {"text": "Disposición en memoria de la información", "c": false}, {"text": "Conjunto de valores junto con sus operaciones", "c": false}, {"text": "Un lenguaje de programación de alto nivel", "c": false}]}, {"text": "¿Qué es una estructura de datos?", "options": [{"text": "La disposición en memoria de la información", "c": true}, {"text": "El conjunto de valores que puede tomar una variable", "c": false}, {"text": "Un algoritmo específico para organizar datos", "c": false}, {"text": "La especificación formal de un TAD", "c": false}]}, {"text": "Según Dijkstra (1972), ¿cuál es el principal desafío del software?", "options": [{"text": "La complejidad del software supera la capacidad mental humana para abordarlo", "c": true}, {"text": "La falta de herramientas de depuración adecuadas", "c": false}, {"text": "La velocidad insuficiente de los ordenadores", "c": false}, {"text": "La incompatibilidad entre lenguajes de programación", "c": false}]}, {"text": "¿Qué propiedad del software indica que es tolerante a fallos?", "options": [{"text": "Robusto", "c": true}, {"text": "Correcto", "c": false}, {"text": "Portable", "c": false}, {"text": "Escalable", "c": false}]}, {"text": "¿Qué propiedad del software significa que cumple las especificaciones?", "options": [{"text": "Correcto", "c": true}, {"text": "Robusto", "c": false}, {"text": "Eficiente", "c": false}, {"text": "Escalable", "c": false}]}, {"text": "¿Cuál es el proceso metódico en informática (orden correcto)?", "options": [{"text": "Análisis → Diseño → Implementación → Verificación", "c": true}, {"text": "Implementación → Diseño → Verificación → Análisis", "c": false}, {"text": "Diseño → Análisis → Implementación → Pruebas", "c": false}, {"text": "Especificación → Codificación → Documentación → Despliegue", "c": false}]}, {"text": "¿Qué tipo de abstracción son los procedimientos y funciones?", "options": [{"text": "Abstracción de control", "c": true}, {"text": "Abstracción de datos", "c": false}, {"text": "Abstracción de iteradores", "c": false}, {"text": "Abstracción de nivel superior", "c": false}], "exp": "Los tipos definidos por el usuario son abstracción de datos; los módulos/paquetes son abstracción de funcionalidades."}, {"text": "¿Qué son los módulos, unidades o paquetes en programación?", "options": [{"text": "Abstracciones de funcionalidades (nivel superior)", "c": true}, {"text": "Abstracciones de control", "c": false}, {"text": "Abstracciones de datos", "c": false}, {"text": "Abstracciones de iteradores", "c": false}]}, {"text": "¿En qué consiste la abstracción por especificación?", "options": [{"text": "Solo necesitamos saber qué hace el procedimiento, no cómo funciona", "c": true}, {"text": "Definir un algoritmo en función de parámetros genéricos", "c": false}, {"text": "Separar el hardware del software del sistema", "c": false}, {"text": "Crear interfaces visuales independientes de la lógica", "c": false}]}, {"text": "¿En qué consiste la abstracción por parametrización?", "options": [{"text": "Un algoritmo, tipo o variable se define en función de parámetros (genericidad)", "c": true}, {"text": "Ocultar los detalles de implementación tras la interfaz", "c": false}, {"text": "Agrupar datos y operaciones relacionadas en un módulo", "c": false}, {"text": "Reducir la complejidad mediante la recursividad", "c": false}]}, {"text": "¿Qué es un TAD (Tipo Abstracto de Datos)?", "options": [{"text": "Conjunto de valores junto con operaciones que los manipulan, especificado independientemente de su implementación", "c": true}, {"text": "Una clase Java o C++ que implementa un tipo genérico", "c": false}, {"text": "Una representación física de datos en la memoria del ordenador", "c": false}, {"text": "Un algoritmo específico de búsqueda y ordenación", "c": false}]}, {"text": "¿Cómo se representa gráficamente un TAD?", "options": [{"text": "Como una caja negra donde solo es visible la interfaz", "c": true}, {"text": "Como un árbol de decisión con sus operaciones", "c": false}, {"text": "Como un diagrama de flujo de ejecución", "c": false}, {"text": "Como una tabla de verdad de las operaciones posibles", "c": false}]}, {"text": "¿Cuáles son los dos niveles de diseño de un TAD?", "options": [{"text": "Especificación (qué hace) e implementación (cómo se hace)", "c": true}, {"text": "Abstracción (qué hace) y algoritmo (cómo se hace)", "c": false}, {"text": "Interfaz (visible) y datos (ocultos)", "c": false}, {"text": "Declaración (nombre) y definición (cuerpo)", "c": false}]}, {"text": "¿Cuántas implementaciones correctas puede tener una misma especificación?", "options": [{"text": "Más de una (pueden existir varias implementaciones correctas)", "c": true}, {"text": "Exactamente una, ya que la especificación la determina", "c": false}, {"text": "Ninguna; la especificación es solo teórica", "c": false}, {"text": "Una por lenguaje de programación utilizado", "c": false}]}, {"text": "¿Cuál es el principio de encapsulación?", "options": [{"text": "Las funciones y datos relacionados deben ir juntos (clases, módulos, paquetes)", "c": true}, {"text": "Los datos deben estar separados de las operaciones que los manipulan", "c": false}, {"text": "Toda la información debe ser pública y accesible", "c": false}, {"text": "Solo los datos primitivos pueden ser encapsulados", "c": false}]}, {"text": "¿Para qué sirve la ocultación de la información?", "options": [{"text": "Para hacer invisible la información no relevante al exterior del módulo", "c": true}, {"text": "Para proteger los datos contra accesos del sistema operativo", "c": false}, {"text": "Para aumentar la velocidad de ejecución del programa", "c": false}, {"text": "Para reducir el tamaño del código fuente compilado", "c": false}]}, {"text": "¿Cuál es el principal inconveniente de los lenguajes de bajo nivel?", "options": [{"text": "No existen abstracciones: no hay procedimientos, registros ni bloques estructurados", "c": true}, {"text": "Son demasiado lentos comparados con los modernos", "c": false}, {"text": "No pueden acceder directamente al hardware", "c": false}, {"text": "Requieren mucha más memoria RAM que los lenguajes modernos", "c": false}]}, {"text": "¿Cuál es el principal inconveniente de los lenguajes estructurados frente a los OO?", "options": [{"text": "Los datos y los procedimientos de manipulación van por separado", "c": true}, {"text": "No soportan recursividad ni funciones anidadas", "c": false}, {"text": "No tienen tipos de datos definidos por el usuario", "c": false}, {"text": "Son más lentos en ejecución que los lenguajes de bajo nivel", "c": false}]}, {"text": "¿Qué característica diferencia a los lenguajes orientados a objetos?", "options": [{"text": "Encapsulan datos y operaciones en clases con separación clara interfaz/implementación", "c": true}, {"text": "Permiten usar punteros de forma más eficiente", "c": false}, {"text": "Compilan a código máquina más rápido", "c": false}, {"text": "No requieren gestión de memoria por parte del programador", "c": false}]}, {"text": "Una clase en un lenguaje orientado a objetos es:", "options": [{"text": "Un TAD que encapsula datos privados y operaciones públicas", "c": true}, {"text": "Solo un conjunto de procedimientos sin estado interno", "c": false}, {"text": "Una estructura de datos sin operaciones asociadas", "c": false}, {"text": "Equivalente a un módulo de lenguaje estructurado sin diferencias", "c": false}]}, {"text": "En Python, ¿para qué sirve el prefijo _ o __ antes de un atributo?", "options": [{"text": "Para indicar que el atributo es privado y no debe accederse directamente desde fuera", "c": true}, {"text": "Para crear métodos estáticos que no necesitan instancia", "c": false}, {"text": "Para indicar que el método es abstracto y debe ser sobrescrito", "c": false}, {"text": "Para marcar el atributo como constante inmutable", "c": false}]}, {"text": "¿Qué son las ABC (Abstract Base Classes) en Python?", "options": [{"text": "Clases que actúan como plantilla, garantizando que las subclases implementen métodos específicos", "c": true}, {"text": "Un módulo de Python para gestión automática de memoria", "c": false}, {"text": "Una clase que implementa todos los métodos necesarios de un TAD directamente", "c": false}, {"text": "Un tipo de colección que almacena elementos de distintos tipos", "c": false}]}, {"text": "En el diseño de una plantilla TAD, ¿qué describe la 'Sintaxis'?", "options": [{"text": "Los prototipos de las funciones: qué argumentos toman y qué devuelven", "c": true}, {"text": "Las precondiciones y postcondiciones de las operaciones", "c": false}, {"text": "El nombre del tipo de dato definido", "c": false}, {"text": "La descripción textual del comportamiento del TAD", "c": false}]}, {"text": "En el diseño de una plantilla TAD, ¿qué describe la 'Semántica'?", "options": [{"text": "Las precondiciones/postcondiciones o reglas deductivas del significado de las operaciones", "c": true}, {"text": "Los prototipos de las funciones", "c": false}, {"text": "El nombre del tipo de dato", "c": false}, {"text": "La estructura de datos interna utilizada", "c": false}]}, {"text": "¿Cuál es la diferencia entre operaciones de observación y modificación en un TAD?", "options": [{"text": "Observación devuelve información sin alterar la estructura; modificación actualiza la estructura", "c": true}, {"text": "Observación altera la estructura; modificación solo consulta", "c": false}, {"text": "Ambas son equivalentes funcionalmente en todos los TADs", "c": false}, {"text": "Observación es siempre más lenta que modificación", "c": false}]}, {"text": "¿Cuál de las siguientes es una operación de observación en un TAD Lista?", "options": [{"text": "longitud(), que devuelve el número de elementos sin modificar la lista", "c": true}, {"text": "insertar(), que añade un nuevo elemento a la lista", "c": false}, {"text": "eliminar(), que borra un elemento de la lista", "c": false}, {"text": "crear(), que inicializa una nueva instancia de la lista", "c": false}]}, {"text": "¿Cuál es la ventaja de la modularidad en el desarrollo de software?", "options": [{"text": "Los errores ocurren en módulos bien localizados, facilitando la corrección", "c": true}, {"text": "Elimina la necesidad de pruebas unitarias", "c": false}, {"text": "Permite que el programa funcione sin sistema operativo", "c": false}, {"text": "Aumenta automáticamente la velocidad de ejecución", "c": false}]}, {"text": "¿Por qué los programas que usan TADs son más fáciles de verificar?", "options": [{"text": "Por la modularidad: los errores deberían ocurrir en módulos bien localizados", "c": true}, {"text": "Porque los TADs generan automáticamente casos de prueba", "c": false}, {"text": "Porque reducen el número total de líneas de código", "c": false}, {"text": "Porque el compilador verifica la corrección automáticamente", "c": false}]}, {"text": "¿En qué lenguaje se puede definir un TAD mediante un 'package'?", "options": [{"text": "Ada", "c": true}, {"text": "C", "c": false}, {"text": "COBOL", "c": false}, {"text": "BASIC", "c": false}]}, {"text": "¿Cuál es el orden evolutivo correcto de los lenguajes de programación?", "options": [{"text": "Bajo nivel → Estructurados → Orientados a objetos", "c": true}, {"text": "Estructurados → Bajo nivel → Orientados a objetos", "c": false}, {"text": "Orientados a objetos → Estructurados → Bajo nivel", "c": false}, {"text": "Bajo nivel → Orientados a objetos → Estructurados", "c": false}]}, {"text": "¿Cuál de los siguientes NO es un lenguaje orientado a objetos?", "options": [{"text": "Pascal", "c": true}, {"text": "Java", "c": false}, {"text": "Smalltalk", "c": false}, {"text": "C++", "c": false}]}, {"text": "¿Qué problema concreto resuelven los TADs según el ejemplo de los 4000 millones de páginas?", "options": [{"text": "Cómo estructurar la información y qué algoritmos usar para consultas rápidas", "c": true}, {"text": "Cómo almacenar grandes volúmenes de texto en disco", "c": false}, {"text": "Cómo distribuir la carga entre múltiples servidores", "c": false}, {"text": "Cómo comprimir datos para reducir el ancho de banda", "c": false}]}, {"text": "¿Qué significa que la implementación del TAD sea 'independiente del lenguaje de programación'?", "options": [{"text": "Que la especificación define el comportamiento sin depender de un lenguaje concreto", "c": true}, {"text": "Que el TAD puede ejecutarse sin necesidad de compilador", "c": false}, {"text": "Que el código del TAD es idéntico en todos los lenguajes", "c": false}, {"text": "Que el TAD funciona igual en hardware diferente", "c": false}]}, {"text": "¿Cuál es la principal ventaja de trabajar con TADs en términos de mantenimiento?", "options": [{"text": "La independencia entre la implementación del TAD y los programas que lo usan", "c": true}, {"text": "Que el código fuente es siempre más corto", "c": false}, {"text": "Que no es necesario documentar las operaciones", "c": false}, {"text": "Que se elimina la necesidad de hacer pruebas de regresión", "c": false}]}, {"text": "El principio 'divide y vencerás' está relacionado con:", "options": [{"text": "Modularidad", "c": true}, {"text": "Ocultación de información", "c": false}, {"text": "Abstracción por parametrización", "c": false}, {"text": "Encapsulación", "c": false}]}, {"text": "¿Cuál de las siguientes afirmaciones sobre la interfaz de un TAD es correcta?", "options": [{"text": "Es la única parte visible para el usuario del TAD", "c": true}, {"text": "Contiene los detalles de cómo se almacenan los datos internamente", "c": false}, {"text": "Solo la ve el diseñador y el programador del TAD", "c": false}, {"text": "Incluye tanto la especificación como la implementación", "c": false}]}, {"text": "¿Cuál es el propósito de 'repartir bien la funcionalidad' en el diseño de software?", "options": [{"text": "Distribuir la complejidad uniformemente usando subrutinas (modularidad)", "c": true}, {"text": "Concentrar toda la lógica en un único módulo principal", "c": false}, {"text": "Evitar el uso de recursividad en el código", "c": false}, {"text": "Garantizar que todos los módulos tengan el mismo número de líneas", "c": false}]}, {"text": "¿Cuál es la diferencia entre 'tipo de dato' y 'TAD'?", "options": [{"text": "El tipo de dato es el conjunto de valores de una variable; el TAD añade operaciones y especificación matemática", "c": true}, {"text": "Son sinónimos en todos los contextos de programación", "c": false}, {"text": "El tipo de dato es más abstracto que el TAD", "c": false}, {"text": "El TAD solo existe en lenguajes orientados a objetos", "c": false}]}, {"text": "¿Qué es la 'abstracción' en el diseño de software?", "options": [{"text": "Separar las características relevantes de las irrelevantes según el contexto", "c": true}, {"text": "Escribir código sin comentarios para que sea más conciso", "c": false}, {"text": "Usar lenguajes de muy alto nivel como Python o Ruby", "c": false}, {"text": "Eliminar todas las variables globales del programa", "c": false}]}];
let qs=[],cur=0,ans=[];
const LB=['A','B','C','D'];
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function start(){
  qs=sh(ALL).map(q=>{
    const so=sh(q.options);
    return{...q,options:so};
  });
  ans=new Array(qs.length).fill(null);
  cur=0;
  document.getElementById('res').style.display='none';
  const qd=document.getElementById('quiz');
  qd.querySelectorAll('.card').forEach(c=>c.remove());
  qd.style.display='block';
  qs.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='card'+(qi===0?' on':'');
    card.id='c'+qi;
    let extra='';
    if(q.code)extra+=`<div class="code">${q.code}</div>`;
    card.innerHTML=`<div class="qt">${q.text}</div>${extra}<div class="opts" id="o${qi}">${
      q.options.map((op,oi)=>`<div class="opt" onclick="pick(${qi},${oi})" id="op${qi}_${oi}">
        <span class="ol">${LB[oi]}</span><span class="ot">${op.text}</span></div>`).join('')
    }</div><div class="fb" id="fb${qi}"></div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${qi===0?'disabled':''}>Anterior</button>
      <span class="pg">${qi+1} / ${qs.length}</span>
      <button class="btn pr" onclick="go(1)">${qi===qs.length-1?'Ver resultado':'Siguiente'}</button>
    </div>`;
    qd.appendChild(card);
  });
  show(0);
}
function show(i){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c'+i);if(c){c.classList.add('on');cur=i;}
  document.getElementById('qc').textContent=`Pregunta ${i+1} de ${qs.length}`;
  document.getElementById('pb').style.width=((i+1)/qs.length*100)+'%';
}
function go(d){const n=cur+d;if(n<0)return;if(n>=qs.length){showRes();return;}show(n);}
function pick(qi,oi){
  if(ans[qi]!==null)return;
  ans[qi]=oi;
  const ci=qs[qi].options.findIndex(o=>o.c);
  if(oi===ci)beep(880,.32);else beep(240,.38);
  qs[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`op${qi}_${i}`);
    el.classList.add('done');
    if(i===ci)el.classList.add('ok');
    else if(i===oi)el.classList.add('bad');
    else el.classList.add('dim');
  });
  if(qs[qi].exp){const fb=document.getElementById('fb'+qi);fb.textContent=qs[qi].exp;fb.classList.add('on');}
}
function showRes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='block';
  let ok=0,ng=0;
  ans.forEach((a,i)=>{if(a===null)return;const ci=qs[i].options.findIndex(o=>o.c);if(a===ci)ok++;else ng++;});
  const tot=qs.length,pct=Math.round(ok/tot*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('sok').textContent=ok;
  document.getElementById('sng').textContent=ng;
  document.getElementById('stot').textContent=tot;
  document.getElementById('rdesc').textContent=pct>=90?'¡Excelente! Dominas el tema.':pct>=70?'Buen resultado. Repasa los fallos.':pct>=50?'Aprobado justo. Sigue repasando.':'Hay que estudiar más. ¡Tú puedes!';
  setTimeout(()=>{document.getElementById('sc').style.strokeDashoffset=326.7-(pct/100)*326.7;},120);
  document.getElementById('pb').style.width='100%';
}
start();
</script>
</body>
</html>
