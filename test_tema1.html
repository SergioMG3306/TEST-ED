const AC=window.AudioContext||window.webkitAudioContext;let _ax=null;
function ga(){if(!_ax)_ax=new AC();return _ax;}
function beep(f,d){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.14,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const LB=['A','B','C','D'];
let qs=[],cur=0,ans=[];

function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function start(pool){
  pool=pool||ALL;
  qs=sh(pool).map(q=>({...q,options:sh(q.options)}));
  ans=new Array(qs.length).fill(null);
  cur=0;
  document.getElementById('res').style.display='none';
  document.getElementById('review').style.display='none';
  const qd=document.getElementById('quiz');
  qd.querySelectorAll('.card').forEach(c=>c.remove());
  qd.style.display='block';
  qs.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='card'+(qi===0?' on':'');
    card.id='c'+qi;
    let extra='';
    if(q.code)extra=`<div class="code">${q.code}</div>`;
    card.innerHTML=`<div class="qt">${q.text}</div>${extra}
<div class="opts" id="o${qi}">${q.options.map((op,oi)=>
  `<div class="opt" onclick="pick(${qi},${oi})" id="op${qi}_${oi}">
   <span class="ol">${LB[oi]}</span><span class="ot">${op.text}</span></div>`).join('')}
</div><div class="fb" id="fb${qi}"></div>
<div class="nav">
  <button class="btn" onclick="go(-1)"${qi===0?' disabled':''}>Anterior</button>
  <span class="pg">${qi+1} / ${qs.length}</span>
  <button class="btn pr" onclick="go(1)">${qi===qs.length-1?'Ver resultado':'Siguiente'}</button>
</div>`;
    qd.appendChild(card);
  });
  show(0);
}

function show(i){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c'+i);if(c){c.classList.add('on');cur=i;}
  document.getElementById('qc').textContent=`Pregunta ${i+1} de ${qs.length}`;
  document.getElementById('pb').style.width=((i+1)/qs.length*100)+'%';
}

function go(d){const n=cur+d;if(n<0)return;if(n>=qs.length){showRes();return;}show(n);}

function pick(qi,oi){
  if(ans[qi]!==null)return;
  ans[qi]=oi;
  const ci=qs[qi].options.findIndex(o=>o.c);
  if(oi===ci)beep(880,.3);else beep(240,.38);
  qs[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`op${qi}_${i}`);
    el.classList.add('done');
    if(i===ci)el.classList.add('ok');
    else if(i===oi)el.classList.add('ng');
    else el.classList.add('dim');
  });
  if(qs[qi].exp){const fb=document.getElementById('fb'+qi);fb.textContent=qs[qi].exp;fb.classList.add('on');}
}

function calcScore(){
  let ok=0,ng=0,sk=0;
  ans.forEach((a,i)=>{if(a===null){sk++;return;}const ci=qs[i].options.findIndex(o=>o.c);if(a===ci)ok++;else ng++;});
  return{ok,ng,sk,tot:qs.length,pct:Math.round(ok/qs.length*100)};
}

function showRes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('review').style.display='none';
  document.getElementById('res').style.display='block';
  const{ok,ng,sk,tot,pct}=calcScore();
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('sok').textContent=ok;
  document.getElementById('sng').textContent=ng;
  document.getElementById('sskip').textContent=sk;
  const desc=pct>=90?'¡Excelente! Dominas el tema.':pct>=70?'Buen resultado. Repasa los fallos.':pct>=50?'Aprobado justo. Sigue repasando.':'Hay que estudiar más. ¡Tú puedes!';
  document.getElementById('rdesc').textContent=desc;
  setTimeout(()=>{document.getElementById('sc').style.strokeDashoffset=326.7-(pct/100)*326.7;},120);
  document.getElementById('pb').style.width='100%';
}

function backToResults(){document.getElementById('review').style.display='none';document.getElementById('res').style.display='block';}

function startReview(){
  document.getElementById('res').style.display='none';
  document.getElementById('review').style.display='block';
  const body=document.getElementById('rev-body');
  body.innerHTML='';
  qs.forEach((q,qi)=>{
    const ci=q.options.findIndex(o=>o.c),ua=ans[qi];
    const st=ua===null?'sk':ua===ci?'ok':'ng';
    const bl=st==='ok'?'✓ Correcta':st==='ng'?'✗ Incorrecta':'Sin responder';
    let h=`<div class="rq">
<div class="rq-num">Pregunta ${qi+1} <span class="badge ${st}">${bl}</span></div>
<div class="rq-text">${q.text}</div>`;
    if(q.code)h+=`<div class="code">${q.code}</div>`;
    q.options.forEach((op,oi)=>{
      const cls=oi===ci?' ok':oi===ua?' ng':'';
      const mk=oi===ci?' ✓':oi===ua?' ✗':'';
      h+=`<div class="rq-opt${cls}"><span style="font-weight:700;min-width:20px">${LB[oi]})</span><span>${op.text}${mk}</span></div>`;
    });
    if(q.exp)h+=`<div class="rq-exp">💡 ${q.exp}</div>`;
    h+='</div>';
    body.innerHTML+=h;
  });
  window.scrollTo(0,0);
}

function exportPDF(){
  const{ok,tot,pct}=calcScore();
  let h=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Revisión</title><style>
body{font-family:Arial,sans-serif;font-size:11.5pt;color:#111;max-width:680px;margin:36px auto;padding:0 18px}
h1{font-size:16pt;margin-bottom:3px}
.meta{color:#555;font-size:10pt;margin-bottom:22px;padding-bottom:10px;border-bottom:1px solid #ddd}
.q{margin-bottom:18px;padding:10px 12px;border:1px solid #ddd;border-radius:6px;page-break-inside:avoid}
.qn{font-size:8.5pt;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.qt{font-weight:600;margin-bottom:7px;line-height:1.5}
.qcode{background:#f5f5f5;border:1px solid #ddd;padding:7px 9px;font-family:Consolas,monospace;font-size:9.5pt;margin-bottom:7px;white-space:pre-wrap}
.op{padding:2px 5px;margin-bottom:2px;border-radius:3px;font-size:10.5pt;line-height:1.4}
.op.ok{background:#f0fdf4;color:#166534;font-weight:600}
.op.ng{background:#fef2f2;color:#991b1b;font-weight:600}
.exp{margin-top:5px;font-size:9pt;color:#555;padding:4px 7px;border-left:3px solid #ddd}
@page{margin:1.5cm}
</style></head><body>
<h1>${QUIZ_TITLE}</h1>
<div class="meta">Resultado: ${ok}/${tot} correctas · ${pct}% · Revisión completa</div>`;
  qs.forEach((q,qi)=>{
    const ci=q.options.findIndex(o=>o.c),ua=ans[qi];
    const st=ua===null?'Sin responder':ua===ci?'✓ Correcta':'✗ Incorrecta';
    h+=`<div class="q"><div class="qn">Pregunta ${qi+1} — ${st}</div><div class="qt">${q.text}</div>`;
    if(q.code)h+=`<div class="qcode">${q.code}</div>`;
    q.options.forEach((op,oi)=>{
      const cls=oi===ci?' ok':oi===ua?' ng':'';
      const mk=oi===ci?' ✓':oi===ua?' ✗':'';
      h+=`<div class="op${cls}">${LB[oi]}) ${op.text}${mk}</div>`;
    });
    if(q.exp)h+=`<div class="exp">💡 ${q.exp}</div>`;
    h+='</div>';
  });
  h+='</body></html>';
  const w=window.open('','_blank');
  w.document.write(h);w.document.close();
  setTimeout(()=>w.print(),450);
}

start();
</script>
</body></html>
