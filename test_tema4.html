<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>El TAD Conjunto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--sf:#f7f7f7;--br:#e4e4e4;--tx:#111;--mx:#666;--ac:#111;--r:8px;--tr:180ms ease}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
#pb{position:fixed;top:0;left:0;height:3px;background:var(--ac);transition:width 400ms ease;z-index:100}
header{padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--br);max-width:740px;margin:0 auto;width:100%}
.sub{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mx);margin-bottom:.4rem}
h1{font-size:1.55rem;font-weight:700;letter-spacing:-.02em}
.bk{display:inline-block;margin-top:.6rem;font-size:.75rem;color:var(--mx);text-decoration:none;letter-spacing:.05em;text-transform:uppercase}
.bk:hover{color:var(--tx)}
main{max-width:740px;margin:0 auto;width:100%;padding:2rem;flex:1}
.qc{font-size:.78rem;color:var(--mx);letter-spacing:.04em;margin-bottom:1.4rem}
.card{display:none;animation:fi 220ms ease}
.card.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qt{font-size:1rem;line-height:1.7;font-weight:500;margin-bottom:1.4rem}
.code{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:.9rem 1rem;font-family:'Fira Code',Consolas,monospace;font-size:.82rem;margin-bottom:1.1rem;line-height:1.55;overflow-x:auto;white-space:pre}
.opts{display:flex;flex-direction:column;gap:.55rem}
.opt{display:flex;align-items:flex-start;gap:.9rem;padding:.85rem 1rem;border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:background var(--tr),border-color var(--tr)}
.opt:hover:not(.done){background:var(--sf);border-color:#bbb}
.ol{font-size:.72rem;font-weight:700;letter-spacing:.05em;min-width:16px;color:var(--mx);padding-top:2px}
.ot{font-size:.92rem;line-height:1.5}
.opt.ok{background:var(--ac);border-color:var(--ac);color:#fff}
.opt.ok .ol{color:rgba(255,255,255,.65)}
.opt.bad{background:#777;border-color:#777;color:#fff;opacity:.85}
.opt.bad .ol{color:rgba(255,255,255,.65)}
.opt.dim{opacity:.3;cursor:default}
.opt.done{cursor:default}
.fb{display:none;margin-top:.9rem;font-size:.83rem;color:var(--mx);line-height:1.55;padding:.75rem 1rem;border-left:3px solid var(--br)}
.fb.on{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--br)}
.pg{font-size:.78rem;color:var(--mx)}
.btn{padding:.55rem 1.3rem;font-size:.85rem;font-weight:600;border:1px solid var(--ac);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--tx);transition:background var(--tr),color var(--tr);letter-spacing:.02em}
.btn:hover{background:var(--ac);color:#fff}
.btn.pr{background:var(--ac);color:#fff}
.btn.pr:hover{opacity:.8}
.btn:disabled{opacity:.28;cursor:default}
.btn:disabled:hover{background:transparent;color:var(--tx)}
#res{display:none;text-align:center;padding:3rem 0;animation:fi 400ms ease}
.ring{width:130px;height:130px;margin:0 auto 1.8rem}
.ring svg{transform:rotate(-90deg)}
.pct{font-size:2.4rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.25rem}
.desc{font-size:.88rem;color:var(--mx);margin-bottom:2.2rem}
.stats{display:flex;justify-content:center;gap:2rem;margin-bottom:2.2rem;font-size:.83rem}
.sv{font-size:1.35rem;font-weight:700;display:block}
.sl{color:var(--mx)}
</style>
</head>
<body>
<div id="pb" style="width:0%"></div>
<header>
  <div class="sub">Estructuras de Datos — Tema 4</div>
  <h1>El TAD Conjunto</h1>
  <a class="bk" href="index.html">← Índice</a>
</header>
<main>
  <div id="quiz">
    <div class="qc" id="qc">Pregunta 1 de N</div>
  </div>
  <div id="res">
    <div class="ring">
      <svg viewBox="0 0 120 120" width="130" height="130">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#e8e8e8" stroke-width="9"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="#111" stroke-width="9"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"
          id="sc" stroke-linecap="round" style="transition:stroke-dashoffset 1.1s ease"/>
      </svg>
    </div>
    <div class="pct" id="pct">0%</div>
    <div class="desc" id="rdesc">—</div>
    <div class="stats">
      <div><span class="sv" id="sok">0</span><span class="sl">Correctas</span></div>
      <div><span class="sv" id="sng">0</span><span class="sl">Incorrectas</span></div>
      <div><span class="sv" id="stot">0</span><span class="sl">Total</span></div>
    </div>
    <button class="btn pr" onclick="start()">Repetir test</button><br>
    <a class="bk" href="index.html" style="margin-top:1rem">← Índice</a>
  </div>
</main>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ax=null;
function ga(){if(!ax)ax=new AC();return ax;}
function beep(f,d){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const ALL=[{"text": "¿Qué es un conjunto en matemáticas?", "options": [{"text": "Colección no ordenada de elementos distintos", "c": true}, {"text": "Secuencia ordenada de elementos homogéneos", "c": false}, {"text": "Estructura donde los elementos pueden repetirse", "c": false}, {"text": "Colección con acceso FIFO a sus elementos", "c": false}]}, {"text": "¿Cuál es la diferencia principal entre el TAD Conjunto y el TAD Lista?", "options": [{"text": "En el conjunto no hay orden de inserción y no se permiten duplicados; en la lista sí hay orden y se permiten", "c": true}, {"text": "El conjunto solo puede almacenar enteros; la lista cualquier tipo", "c": false}, {"text": "El conjunto admite duplicados; la lista no", "c": false}, {"text": "La lista es siempre más eficiente que el conjunto", "c": false}]}, {"text": "¿Qué significa la notación 'A ⊆ B'?", "options": [{"text": "Todo elemento de A también pertenece a B (A está contenido en B)", "c": true}, {"text": "A y B tienen exactamente los mismos elementos", "c": false}, {"text": "La unión de A y B da el conjunto universal", "c": false}, {"text": "A y B son conjuntos disjuntos (sin elementos comunes)", "c": false}]}, {"text": "¿Cuál es el conjunto vacío?", "options": [{"text": "El conjunto sin ningún elemento (∅ o {})", "c": true}, {"text": "El conjunto con un único elemento: {0}", "c": false}, {"text": "El conjunto que contiene al conjunto vacío: {∅}", "c": false}, {"text": "Un conjunto cuyo cardinal es indefinido", "c": false}]}, {"text": "¿Qué operación bit a bit implementa la UNIÓN de dos conjuntos en la representación de arrays de bits?", "options": [{"text": "OR inclusivo (|)", "c": true}, {"text": "AND (&)", "c": false}, {"text": "XOR (^)", "c": false}, {"text": "NOT (~)", "c": false}]}, {"text": "¿Qué operación bit a bit implementa la INTERSECCIÓN de dos conjuntos?", "options": [{"text": "AND (&)", "c": true}, {"text": "OR (|)", "c": false}, {"text": "XOR (^)", "c": false}, {"text": "NOT seguido de OR", "c": false}]}, {"text": "¿Cómo se implementa la DIFERENCIA A-B con arrays de bits?", "options": [{"text": "A & (~B)  —  AND de A con el complemento de B", "c": true}, {"text": "A | (~B)  —  OR de A con el complemento de B", "c": false}, {"text": "A ^ B  —  XOR de A y B", "c": false}, {"text": "(~A) & B  —  AND del complemento de A con B", "c": false}]}, {"text": "¿Qué operación bit a bit implementa la DIFERENCIA SIMÉTRICA (A-B)∪(B-A)?", "options": [{"text": "XOR (^)", "c": true}, {"text": "AND (&)", "c": false}, {"text": "OR (|)", "c": false}, {"text": "NOT (~) seguido de AND", "c": false}]}, {"text": "¿Cómo se comprueba la IGUALDAD de dos conjuntos en la representación de arrays de bits?", "options": [{"text": "Comparación directa: A == B", "c": true}, {"text": "A & B == A", "c": false}, {"text": "A | B == A", "c": false}, {"text": "(A ^ B) == 0xFF", "c": false}]}, {"text": "¿Cómo se verifica que A ⊆ B (A es subconjunto de B) con arrays de bits?", "options": [{"text": "(A & B) == A  —  la intersección de A y B debe ser igual a A", "c": true}, {"text": "A | B == B", "c": false}, {"text": "A ^ B == 0", "c": false}, {"text": "A == B", "c": false}]}, {"text": "¿Cómo se comprueba si x pertenece a un conjunto A representado como array de bits?", "options": [{"text": "(A >> x) % 2 == 1  —  desplazamiento a la derecha y test del bit de signo", "c": true}, {"text": "(A << x) % 2 == 1", "c": false}, {"text": "(A & x) == 1", "c": false}, {"text": "(A | x) == A", "c": false}]}, {"text": "¿Cómo se inserta el elemento x en un conjunto A representado como array de bits?", "options": [{"text": "A = A + (1 << x)  —  sumar el valor con el bit x a 1", "c": true}, {"text": "A = A | x", "c": false}, {"text": "A = A >> x", "c": false}, {"text": "A = A + x", "c": false}]}, {"text": "¿Cómo se borra el elemento x de un conjunto A representado como array de bits?", "options": [{"text": "A = A - (1 << x)  —  restar el valor con el bit x a 1", "c": true}, {"text": "A = A & (~x)", "c": false}, {"text": "A = A << x", "c": false}, {"text": "A = A ^ (1 << x)", "c": false}]}, {"text": "¿Cuál es la principal ventaja de la representación con arrays de bits?", "options": [{"text": "Todas las operaciones se ejecutan en tiempo O(1) y ocupa el menor espacio posible", "c": true}, {"text": "Admite cualquier rango de representación sin limitaciones", "c": false}, {"text": "No requiere conocer el tamaño del conjunto universal", "c": false}, {"text": "Es la más sencilla de implementar en cualquier lenguaje", "c": false}]}, {"text": "¿Cuál es el principal inconveniente de la representación con arrays de bits?", "options": [{"text": "El rango de representación es muy limitado (tamaño de la palabra del procesador)", "c": true}, {"text": "Las operaciones de unión e intersección son muy lentas", "c": false}, {"text": "Requiere mucha más memoria que otras representaciones", "c": false}, {"text": "No permite comprobar la pertenencia de un elemento", "c": false}]}, {"text": "En la representación con array de elementos (no bits), ¿cuál es el coste de la operación 'pertenece'?", "options": [{"text": "O(|A|) — hay que recorrer el array buscando el elemento", "c": true}, {"text": "O(1) — acceso directo por índice", "c": false}, {"text": "O(log|A|) — búsqueda binaria si está ordenado", "c": false}, {"text": "O(|A|²) — comparación de todos los pares", "c": false}]}, {"text": "En la representación con array, ¿cómo se implementa el BORRADO de elemento x?", "options": [{"text": "Se sustituye x por el último elemento del array y se decrementa el cardinal", "c": true}, {"text": "Se desplazan todos los elementos posteriores a x una posición a la izquierda", "c": false}, {"text": "Se marca la posición de x como vacía con un valor especial", "c": false}, {"text": "Se reconstruye el array completo sin el elemento x", "c": false}]}, {"text": "¿Cuál es el coste de las operaciones de UNIÓN e INTERSECCIÓN con array NO ordenado?", "options": [{"text": "O(|A|·|B|) porque por cada elemento de A hay que recorrer B para comprobar pertenencia", "c": true}, {"text": "O(|A|+|B|) gracias al recorrido paralelo de ambos arrays", "c": false}, {"text": "O(|A|) si |A| < |B|", "c": false}, {"text": "O(1) con acceso directo a los índices", "c": false}]}, {"text": "¿Cuál es la ventaja de usar listas enlazadas ORDENADAS sobre las no ordenadas para conjuntos?", "options": [{"text": "Unión, intersección y diferencia se ejecutan en O(|A|+|B|) con un único recorrido paralelo", "c": true}, {"text": "La inserción es siempre O(1) al ir al final de la lista", "c": false}, {"text": "No se necesita una cabecera ficticia ni centinela", "c": false}, {"text": "No hace falta comparar elementos durante el recorrido", "c": false}]}, {"text": "¿Qué es la 'cabecera ficticia' en la lista enlazada ordenada?", "options": [{"text": "Un nodo sin clave al inicio de la lista que evita el caso especial de insertar antes del primer elemento", "c": true}, {"text": "El primer nodo con datos reales de la lista", "c": false}, {"text": "Un nodo que almacena el tamaño de la lista", "c": false}, {"text": "Un puntero externo que apunta siempre al último nodo", "c": false}]}, {"text": "¿Qué es el 'centinela' en la lista enlazada ordenada?", "options": [{"text": "Un nodo al final de la lista que agiliza la búsqueda copiando la clave buscada para evitar comprobaciones de fin", "c": true}, {"text": "Un nodo al inicio que evita el caso especial de lista vacía", "c": false}, {"text": "Un contador que registra el número de operaciones realizadas", "c": false}, {"text": "Un marcador que indica el elemento de mayor valor del conjunto", "c": false}]}, {"text": "¿Cómo se inicializa la lista con cabecera ficticia y centinela cuando está vacía?", "options": [{"text": "cabecera.sig apunta al centinela; centinela.sig apunta a sí mismo", "c": true}, {"text": "cabecera.sig = NULL; centinela.sig = NULL", "c": false}, {"text": "cabecera.sig = centinela.sig = cabecera", "c": false}, {"text": "cabecera y centinela son el mismo nodo", "c": false}]}, {"text": "¿Cuál es el coste de operaciones como pertenencia, inserción y borrado en lista enlazada ordenada?", "options": [{"text": "O(|A|) — hay que recorrer la lista hasta encontrar o superar el elemento", "c": true}, {"text": "O(1) — gracias a la cabecera ficticia y el centinela", "c": false}, {"text": "O(log|A|) — la lista ordenada permite búsqueda binaria", "c": false}, {"text": "O(|A|²) — por la necesidad de mantener el orden", "c": false}]}, {"text": "¿Cuál es el coste de unión, intersección y diferencia con lista enlazada ordenada?", "options": [{"text": "O(|A|+|B|) — un único recorrido paralelo de ambas listas", "c": true}, {"text": "O(|A|·|B|) — por cada elemento de A se recorre B", "c": false}, {"text": "O(|A| log|B|) — búsqueda binaria en B para cada elemento de A", "c": false}, {"text": "O(1) con el algoritmo de fusión", "c": false}]}, {"text": "En la operación INTERSECCIÓN con listas ordenadas, ¿cuándo se añade un elemento al resultado?", "options": [{"text": "Cuando el elemento actual es igual en ambas listas (c1.elem == c2.elem)", "c": true}, {"text": "Cuando el elemento de A es menor que el de B", "c": false}, {"text": "Cuando el elemento de A es mayor que el de B", "c": false}, {"text": "Cuando se ha llegado al centinela de una de las dos listas", "c": false}]}, {"text": "En la operación DIFERENCIA A-B con listas ordenadas, ¿cuándo se añade un elemento de A al resultado?", "options": [{"text": "Cuando c1.elem < c2.elem (elemento de A es menor que el de B: no está en B)", "c": true}, {"text": "Cuando c1.elem == c2.elem (el elemento está en ambas listas)", "c": false}, {"text": "Cuando c1.elem > c2.elem (el elemento de A supera al de B)", "c": false}, {"text": "Siempre que se recorra un elemento de A", "c": false}]}, {"text": "¿Qué espacio en memoria ocupa el conjunto A con representación de lista enlazada?", "options": [{"text": "O(|A|) — proporcional al número de elementos del conjunto", "c": true}, {"text": "O(|U|) — proporcional al tamaño del conjunto universal", "c": false}, {"text": "O(|A|²) — por los punteros de doble enlace", "c": false}, {"text": "O(1) — independiente del número de elementos", "c": false}]}, {"text": "¿Por qué la representación de conjuntos con array de bits es muy eficiente para operaciones de conjunto?", "options": [{"text": "Porque la CPU puede operar sobre todos los bits a la vez en una sola instrucción", "c": true}, {"text": "Porque ocupa exactamente un bit por elemento", "c": false}, {"text": "Porque no requiere bucles para calcular unión o intersección", "c": false}, {"text": "Ambas A y C son correctas", "c": false}]}, {"text": "¿Cuál es la representación de A={2,3,6,7} en un array de 8 bits (bit más significativo a la izquierda)?", "options": [{"text": "11001100", "c": true}, {"text": "00110011", "c": false}, {"text": "11110000", "c": false}, {"text": "00001111", "c": false}], "exp": "Los bits en posiciones 2,3,6,7 (contando desde el bit menos significativo, derecha) valen 1."}, {"text": "Dado A=11001100 (8 bits) y B=10010100, ¿cuál es A & B (intersección)?", "options": [{"text": "10000100", "c": true}, {"text": "11011100", "c": false}, {"text": "01011000", "c": false}, {"text": "11111111", "c": false}], "code": "A = 11001100  (A={2,3,6,7})\nB = 10010100  (B={2,4,7})\nA & B = ?", "exp": "11001100 AND 10010100 = 10000100 → C={2,7}"}, {"text": "Dado A=11001100, ¿cuál es ~A (negación, complemento)?", "options": [{"text": "00110011", "c": true}, {"text": "11110000", "c": false}, {"text": "10101010", "c": false}, {"text": "11001101", "c": false}]}, {"text": "¿Cuál es el cardinal del conjunto representado por 10110010 (8 bits)?", "options": [{"text": "4 (hay 4 bits a 1)", "c": true}, {"text": "2 (el valor numérico en decimal es 178)", "c": false}, {"text": "8 (tamaño del array de bits)", "c": false}, {"text": "3 (número de bits a 0 contiguos)", "c": false}]}, {"text": "¿Cuál es el coste de la operación de pertenencia en la representación con array NO ordenado?", "options": [{"text": "O(n) — recorrido lineal buscando el elemento", "c": true}, {"text": "O(1) — acceso directo al índice", "c": false}, {"text": "O(log n) — búsqueda binaria", "c": false}, {"text": "O(n log n) — ordenación previa necesaria", "c": false}]}, {"text": "¿En qué se diferencia el borrado en la implementación con array respecto a la lista enlazada?", "options": [{"text": "Con array el borrado es O(n) por la búsqueda, pero O(1) para eliminar (sustituir por el último); con lista enlazada también O(n)", "c": true}, {"text": "Con array es siempre O(1); con lista enlazada es O(n)", "c": false}, {"text": "Con array es O(n²); con lista enlazada es O(n)", "c": false}, {"text": "Con array el borrado no es posible sin reconstruir todo el array", "c": false}]}, {"text": "¿Por qué se usa una cabecera ficticia en la inserción ordenada?", "options": [{"text": "Para evitar el caso especial de insertar antes del primer elemento real de la lista", "c": true}, {"text": "Para almacenar el número total de elementos", "c": false}, {"text": "Para hacer la búsqueda del centinela más rápida", "c": false}, {"text": "Para poder tener listas de longitud ilimitada", "c": false}]}, {"text": "En la operación de UNIÓN con listas ordenadas, si c1.elem == c2.elem, ¿qué se hace?", "options": [{"text": "Se añade el elemento una sola vez y se avanza en AMBAS listas", "c": true}, {"text": "Se añade el elemento dos veces (una por cada lista)", "c": false}, {"text": "Se avanza solo en la lista A y se ignora el de B", "c": false}, {"text": "Se avanza solo en la lista B y se ignora el de A", "c": false}]}, {"text": "¿Qué ocupa más memoria: la representación con array de bits o con lista enlazada?", "options": [{"text": "Depende: array de bits ocupa O(|U|); lista enlazada ocupa O(|A|). Más eficiente la lista cuando el conjunto es disperso", "c": true}, {"text": "Siempre la lista enlazada por los punteros extra", "c": false}, {"text": "Siempre el array de bits por almacenar todos los posibles valores", "c": false}, {"text": "Ambas ocupan exactamente lo mismo: O(|A|)", "c": false}]}, {"text": "En la operación 'subconjunto' con listas ordenadas, ¿qué indica que A NO es subconjunto de B?", "options": [{"text": "Que aparece c1.elem < c2.elem: hay un elemento en A que no está en B", "c": true}, {"text": "Que |A| > |B| (A tiene más elementos que B)", "c": false}, {"text": "Que c1.elem > c2.elem en algún momento del recorrido", "c": false}, {"text": "Que se llega al centinela de B antes que al de A", "c": false}]}, {"text": "¿Cuál es la conclusión del tema sobre el uso eficiente de conjuntos para grandes volúmenes?", "options": [{"text": "La lista enlazada es muy ineficiente para inserción/consulta individual; se recomienda tablas de dispersión o árboles", "c": true}, {"text": "El array de bits es siempre la mejor opción para cualquier caso de uso", "c": false}, {"text": "La lista no ordenada es suficientemente eficiente para la mayoría de aplicaciones", "c": false}, {"text": "El array ordenado es siempre mejor que la lista enlazada", "c": false}]}, {"text": "¿Cuál es el coste de 'igualdad' entre dos conjuntos implementados con array?", "options": [{"text": "O(|A|) si se comprueba primero el cardinal y luego si A ⊆ B", "c": true}, {"text": "O(|A|·|B|) siempre", "c": false}, {"text": "O(1) comparando los cardinals", "c": false}, {"text": "O(|A| + |B|) sin importar si los cardinals son distintos", "c": false}]}];
let qs=[],cur=0,ans=[];
const LB=['A','B','C','D'];
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function start(){
  qs=sh(ALL).map(q=>{
    const so=sh(q.options);
    return{...q,options:so};
  });
  ans=new Array(qs.length).fill(null);
  cur=0;
  document.getElementById('res').style.display='none';
  const qd=document.getElementById('quiz');
  qd.querySelectorAll('.card').forEach(c=>c.remove());
  qd.style.display='block';
  qs.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='card'+(qi===0?' on':'');
    card.id='c'+qi;
    let extra='';
    if(q.code)extra+=`<div class="code">${q.code}</div>`;
    card.innerHTML=`<div class="qt">${q.text}</div>${extra}<div class="opts" id="o${qi}">${
      q.options.map((op,oi)=>`<div class="opt" onclick="pick(${qi},${oi})" id="op${qi}_${oi}">
        <span class="ol">${LB[oi]}</span><span class="ot">${op.text}</span></div>`).join('')
    }</div><div class="fb" id="fb${qi}"></div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${qi===0?'disabled':''}>Anterior</button>
      <span class="pg">${qi+1} / ${qs.length}</span>
      <button class="btn pr" onclick="go(1)">${qi===qs.length-1?'Ver resultado':'Siguiente'}</button>
    </div>`;
    qd.appendChild(card);
  });
  show(0);
}
function show(i){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c'+i);if(c){c.classList.add('on');cur=i;}
  document.getElementById('qc').textContent=`Pregunta ${i+1} de ${qs.length}`;
  document.getElementById('pb').style.width=((i+1)/qs.length*100)+'%';
}
function go(d){const n=cur+d;if(n<0)return;if(n>=qs.length){showRes();return;}show(n);}
function pick(qi,oi){
  if(ans[qi]!==null)return;
  ans[qi]=oi;
  const ci=qs[qi].options.findIndex(o=>o.c);
  if(oi===ci)beep(880,.32);else beep(240,.38);
  qs[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`op${qi}_${i}`);
    el.classList.add('done');
    if(i===ci)el.classList.add('ok');
    else if(i===oi)el.classList.add('bad');
    else el.classList.add('dim');
  });
  if(qs[qi].exp){const fb=document.getElementById('fb'+qi);fb.textContent=qs[qi].exp;fb.classList.add('on');}
}
function showRes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='block';
  let ok=0,ng=0;
  ans.forEach((a,i)=>{if(a===null)return;const ci=qs[i].options.findIndex(o=>o.c);if(a===ci)ok++;else ng++;});
  const tot=qs.length,pct=Math.round(ok/tot*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('sok').textContent=ok;
  document.getElementById('sng').textContent=ng;
  document.getElementById('stot').textContent=tot;
  document.getElementById('rdesc').textContent=pct>=90?'¡Excelente! Dominas el tema.':pct>=70?'Buen resultado. Repasa los fallos.':pct>=50?'Aprobado justo. Sigue repasando.':'Hay que estudiar más. ¡Tú puedes!';
  setTimeout(()=>{document.getElementById('sc').style.strokeDashoffset=326.7-(pct/100)*326.7;},120);
  document.getElementById('pb').style.width='100%';
}
start();
</script>
