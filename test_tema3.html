<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TADs Lineales: Listas, Pilas y Colas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--sf:#f7f7f7;--br:#e4e4e4;--tx:#111;--mx:#666;--ac:#111;--r:8px;--tr:180ms ease}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
#pb{position:fixed;top:0;left:0;height:3px;background:var(--ac);transition:width 400ms ease;z-index:100}
header{padding:2.5rem 2rem 1.5rem;border-bottom:1px solid var(--br);max-width:740px;margin:0 auto;width:100%}
.sub{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mx);margin-bottom:.4rem}
h1{font-size:1.55rem;font-weight:700;letter-spacing:-.02em}
.bk{display:inline-block;margin-top:.6rem;font-size:.75rem;color:var(--mx);text-decoration:none;letter-spacing:.05em;text-transform:uppercase}
.bk:hover{color:var(--tx)}
main{max-width:740px;margin:0 auto;width:100%;padding:2rem;flex:1}
.qc{font-size:.78rem;color:var(--mx);letter-spacing:.04em;margin-bottom:1.4rem}
.card{display:none;animation:fi 220ms ease}
.card.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qt{font-size:1rem;line-height:1.7;font-weight:500;margin-bottom:1.4rem}
.code{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:.9rem 1rem;font-family:'Fira Code',Consolas,monospace;font-size:.82rem;margin-bottom:1.1rem;line-height:1.55;overflow-x:auto;white-space:pre}
.opts{display:flex;flex-direction:column;gap:.55rem}
.opt{display:flex;align-items:flex-start;gap:.9rem;padding:.85rem 1rem;border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:background var(--tr),border-color var(--tr)}
.opt:hover:not(.done){background:var(--sf);border-color:#bbb}
.ol{font-size:.72rem;font-weight:700;letter-spacing:.05em;min-width:16px;color:var(--mx);padding-top:2px}
.ot{font-size:.92rem;line-height:1.5}
.opt.ok{background:var(--ac);border-color:var(--ac);color:#fff}
.opt.ok .ol{color:rgba(255,255,255,.65)}
.opt.bad{background:#777;border-color:#777;color:#fff;opacity:.85}
.opt.bad .ol{color:rgba(255,255,255,.65)}
.opt.dim{opacity:.3;cursor:default}
.opt.done{cursor:default}
.fb{display:none;margin-top:.9rem;font-size:.83rem;color:var(--mx);line-height:1.55;padding:.75rem 1rem;border-left:3px solid var(--br)}
.fb.on{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--br)}
.pg{font-size:.78rem;color:var(--mx)}
.btn{padding:.55rem 1.3rem;font-size:.85rem;font-weight:600;border:1px solid var(--ac);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--tx);transition:background var(--tr),color var(--tr);letter-spacing:.02em}
.btn:hover{background:var(--ac);color:#fff}
.btn.pr{background:var(--ac);color:#fff}
.btn.pr:hover{opacity:.8}
.btn:disabled{opacity:.28;cursor:default}
.btn:disabled:hover{background:transparent;color:var(--tx)}
#res{display:none;text-align:center;padding:3rem 0;animation:fi 400ms ease}
.ring{width:130px;height:130px;margin:0 auto 1.8rem}
.ring svg{transform:rotate(-90deg)}
.pct{font-size:2.4rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.25rem}
.desc{font-size:.88rem;color:var(--mx);margin-bottom:2.2rem}
.stats{display:flex;justify-content:center;gap:2rem;margin-bottom:2.2rem;font-size:.83rem}
.sv{font-size:1.35rem;font-weight:700;display:block}
.sl{color:var(--mx)}
</style>
</head>
<body>
<div id="pb" style="width:0%"></div>
<header>
  <div class="sub">Estructuras de Datos — Tema 3</div>
  <h1>TADs Lineales: Listas, Pilas y Colas</h1>
  <a class="bk" href="index.html">← Índice</a>
</header>
<main>
  <div id="quiz">
    <div class="qc" id="qc">Pregunta 1 de N</div>
  </div>
  <div id="res">
    <div class="ring">
      <svg viewBox="0 0 120 120" width="130" height="130">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#e8e8e8" stroke-width="9"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="#111" stroke-width="9"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"
          id="sc" stroke-linecap="round" style="transition:stroke-dashoffset 1.1s ease"/>
      </svg>
    </div>
    <div class="pct" id="pct">0%</div>
    <div class="desc" id="rdesc">—</div>
    <div class="stats">
      <div><span class="sv" id="sok">0</span><span class="sl">Correctas</span></div>
      <div><span class="sv" id="sng">0</span><span class="sl">Incorrectas</span></div>
      <div><span class="sv" id="stot">0</span><span class="sl">Total</span></div>
    </div>
    <button class="btn pr" onclick="start()">Repetir test</button><br>
    <a class="bk" href="index.html" style="margin-top:1rem">← Índice</a>
  </div>
</main>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ax=null;
function ga(){if(!ax)ax=new AC();return ax;}
function beep(f,d){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const ALL=[{"text": "¿En qué relación matemática se apoyan las estructuras de datos lineales?", "options": [{"text": "Relación binaria de orden total (RBOT): reflexiva, antisimétrica, transitiva y total", "c": true}, {"text": "Relación de equivalencia: reflexiva, simétrica y transitiva", "c": false}, {"text": "Relación de orden parcial: reflexiva, antisimétrica y transitiva", "c": false}, {"text": "Relación de orden estricto: irreflexiva y transitiva", "c": false}]}, {"text": "¿Cuántos elementos adyacentes puede tener como máximo un elemento en una estructura lineal?", "options": [{"text": "2 (anterior y posterior)", "c": true}, {"text": "1 (solo el siguiente)", "c": false}, {"text": "N (tantos como indique la implementación)", "c": false}, {"text": "4 (izquierda, derecha, arriba, abajo)", "c": false}]}, {"text": "¿Qué es el TAD Lista?", "options": [{"text": "Secuencia ordenada de elementos homogéneos según el orden que ocupan en la lista", "c": true}, {"text": "Colección no ordenada de elementos sin repetición", "c": false}, {"text": "Estructura donde solo se puede insertar y extraer por un extremo", "c": false}, {"text": "Estructura FIFO donde el primero en entrar es el primero en salir", "c": false}]}, {"text": "¿Qué recibe el nombre de 'nodo' en el TAD Lista?", "options": [{"text": "Cada elemento individual que forma parte de la lista", "c": true}, {"text": "El puntero que enlaza dos elementos consecutivos", "c": false}, {"text": "El primer elemento de la lista (cabeza)", "c": false}, {"text": "La posición índice de un elemento en la lista", "c": false}]}, {"text": "¿Cuál es la diferencia principal entre lista y cola/pila?", "options": [{"text": "En una lista los elementos pueden añadirse y borrarse en cualquier posición; en cola/pila no", "c": true}, {"text": "La lista es siempre más eficiente que la cola y la pila", "c": false}, {"text": "La lista implementa FIFO; cola implementa LIFO", "c": false}, {"text": "La pila y la cola admiten acceso aleatorio; la lista no", "c": false}]}, {"text": "¿Qué estrategias de implementación existen para el TAD Lista?", "options": [{"text": "Memoria dinámica (punteros) y memoria estática (vectores)", "c": true}, {"text": "Memoria volátil y memoria no volátil", "c": false}, {"text": "Implementación recursiva e implementación iterativa", "c": false}, {"text": "Implementación orientada a objetos e implementación funcional", "c": false}]}, {"text": "¿Cuál es la ventaja principal de la implementación con memoria dinámica?", "options": [{"text": "El número de nodos puede variar (no hay límite fijo)", "c": true}, {"text": "La gestión de memoria es transparente al programador", "c": false}, {"text": "Las operaciones de inserción y borrado son siempre O(1)", "c": false}, {"text": "No requiere el uso de punteros", "c": false}]}, {"text": "¿Cuál es el inconveniente de la implementación con memoria estática (vector)?", "options": [{"text": "El número de nodos es fijo (restricción de memoria)", "c": true}, {"text": "El número de nodos puede crecer indefinidamente", "c": false}, {"text": "No se pueden implementar listas ordenadas", "c": false}, {"text": "La gestión de memoria recae sobre el programador", "c": false}]}, {"text": "¿Qué es un puntero?", "options": [{"text": "Una variable cuyo contenido es una dirección de memoria", "c": true}, {"text": "Un tipo de dato que almacena valores booleanos", "c": false}, {"text": "Un índice de acceso a un vector estático", "c": false}, {"text": "Una referencia inmutable a un objeto en Python", "c": false}]}, {"text": "¿Para qué se usan las 'estructuras autoreferenciadas' en listas enlazadas?", "options": [{"text": "Para que cada nodo contenga un puntero al próximo nodo de la lista", "c": true}, {"text": "Para que el primer nodo siempre apunte al último", "c": false}, {"text": "Para que la lista pueda almacenarse en disco duro", "c": false}, {"text": "Para que el tamaño de la lista sea fijo en compilación", "c": false}]}, {"text": "En la implementación con vector, ¿cuál es el coste promedio de insertar en posición p?", "options": [{"text": "O(n) — hay que desplazar los elementos posteriores a p", "c": true}, {"text": "O(1) — acceso aleatorio directo a la posición", "c": false}, {"text": "O(log n) — búsqueda binaria de la posición", "c": false}, {"text": "O(n²) — se compara cada elemento con todos los demás", "c": false}]}, {"text": "¿Qué es una lista doblemente enlazada?", "options": [{"text": "Una lista donde cada nodo tiene puntero al siguiente Y al anterior", "c": true}, {"text": "Una lista que puede recorrerse solo en una dirección", "c": false}, {"text": "Una lista con dos cabeceras independientes", "c": false}, {"text": "Una lista que almacena dos valores por nodo", "c": false}]}, {"text": "¿Qué es una lista circular?", "options": [{"text": "Una lista donde el último nodo apunta al primero", "c": true}, {"text": "Una lista donde los elementos están ordenados circularmente", "c": false}, {"text": "Una lista implementada con un array bidimensional", "c": false}, {"text": "Una lista que nunca puede estar vacía", "c": false}]}, {"text": "En la representación vectorial enlazada, ¿qué se simula?", "options": [{"text": "El concepto de puntero dentro de un vector (elementos no consecutivos = no adyacentes en lista)", "c": true}, {"text": "Una lista ordenada usando índices negativos", "c": false}, {"text": "El recorrido circular de un vector estático", "c": false}, {"text": "La implementación dinámica sin gestión manual de memoria", "c": false}]}, {"text": "¿Para qué sirve la 'lista auxiliar de posiciones libres' en representación vectorial enlazada?", "options": [{"text": "Para saber qué posiciones del vector están libres y poder insertar nuevos nodos", "c": true}, {"text": "Para mantener el orden de los elementos de la lista", "c": false}, {"text": "Para almacenar los elementos borrados antes de liberarlos", "c": false}, {"text": "Para acelerar la búsqueda de elementos en la lista", "c": false}]}, {"text": "¿Qué es el TAD Cola y qué política sigue?", "options": [{"text": "Estructura FIFO (First-In First-Out): el primer elemento en entrar es el primero en salir", "c": true}, {"text": "Estructura LIFO (Last-In First-Out): el último en entrar es el primero en salir", "c": false}, {"text": "Estructura con acceso aleatorio a cualquier posición", "c": false}, {"text": "Estructura donde solo se puede insertar y no eliminar", "c": false}]}, {"text": "¿Qué hace la operación 'encolar(c, e)' en el TAD Cola?", "options": [{"text": "Inserta el elemento e en la última posición de la cola c", "c": true}, {"text": "Elimina el primer elemento de la cola c", "c": false}, {"text": "Devuelve el primer elemento de la cola sin eliminarlo", "c": false}, {"text": "Comprueba si la cola está vacía", "c": false}]}, {"text": "¿Qué hace la operación 'desencolar(c)' en el TAD Cola?", "options": [{"text": "Elimina el primer elemento de la cola c", "c": true}, {"text": "Inserta un nuevo elemento al final de la cola", "c": false}, {"text": "Devuelve el primer elemento sin eliminarlo", "c": false}, {"text": "Vacía completamente la cola", "c": false}]}, {"text": "¿Qué hace la operación 'primero(c)' en el TAD Cola?", "options": [{"text": "Devuelve el primer elemento de la cola sin desencolar", "c": true}, {"text": "Devuelve y elimina el primer elemento de la cola", "c": false}, {"text": "Inserta un elemento al principio de la cola", "c": false}, {"text": "Devuelve el último elemento insertado en la cola", "c": false}]}, {"text": "¿Qué es el TAD Pila y qué política sigue?", "options": [{"text": "Estructura LIFO (Last-In First-Out): el último en entrar es el primero en salir", "c": true}, {"text": "Estructura FIFO (First-In First-Out): el primero en entrar es el primero en salir", "c": false}, {"text": "Estructura con acceso aleatorio y sin restricciones de orden", "c": false}, {"text": "Estructura donde los elementos se insertan y extraen por extremos opuestos", "c": false}]}, {"text": "¿Cuál de las siguientes es una aplicación real del TAD Pila en informática?", "options": [{"text": "Gestión de direcciones de retorno en llamadas a subrutinas por el sistema operativo", "c": true}, {"text": "Cola de procesos en espera de la CPU", "c": false}, {"text": "Tabla de páginas de memoria virtual", "c": false}, {"text": "Registro de histórico de navegación (sin retroceso)", "c": false}]}, {"text": "¿Qué hace la operación 'apilar(p, e)' (push) en el TAD Pila?", "options": [{"text": "Inserta el elemento e en la cima (top) de la pila p", "c": true}, {"text": "Elimina el elemento de la cima de la pila", "c": false}, {"text": "Devuelve el tope sin modificar la pila", "c": false}, {"text": "Comprueba si la pila tiene espacio disponible", "c": false}]}, {"text": "¿Qué hace la operación 'desapilar(p)' (pop) en el TAD Pila?", "options": [{"text": "Elimina el elemento de la cima (top) de la pila", "c": true}, {"text": "Inserta un nuevo elemento en la cima", "c": false}, {"text": "Devuelve el tope sin eliminarlo", "c": false}, {"text": "Devuelve todos los elementos en orden inverso", "c": false}]}, {"text": "¿Qué hace la operación 'tope(p)' en el TAD Pila?", "options": [{"text": "Devuelve el elemento de la cima sin eliminarlo de la pila", "c": true}, {"text": "Elimina y devuelve el elemento de la cima", "c": false}, {"text": "Inserta un elemento en la posición del tope", "c": false}, {"text": "Devuelve el número de elementos apilados", "c": false}]}, {"text": "En la implementación estática de una Cola con vector circular, ¿por qué se usa aritmética modular?", "options": [{"text": "Para actualizar primero y último de forma que el vector se 'envuelva' y aproveche todos los huecos", "c": true}, {"text": "Para calcular el número de elementos en tiempo O(1)", "c": false}, {"text": "Para ordenar los elementos automáticamente", "c": false}, {"text": "Para evitar colisiones entre elementos del mismo valor", "c": false}]}, {"text": "¿Por qué en la cola circular se necesita una variable 'longitud' además de 'primero' y 'último'?", "options": [{"text": "Para distinguir los casos de cola vacía y cola llena (ambos tienen primero == último)", "c": true}, {"text": "Para calcular el índice del elemento central", "c": false}, {"text": "Para saber qué elementos han sido visitados", "c": false}, {"text": "Para implementar la operación de cola con memoria dinámica", "c": false}]}, {"text": "En una lista con memoria estática simple (vector secuencial), si se inserta en posición p, ¿qué hay que hacer?", "options": [{"text": "Desplazar hacia la derecha todos los elementos desde la posición p hasta el último", "c": true}, {"text": "Sobreescribir el elemento existente en la posición p", "c": false}, {"text": "Insertar siempre al final del vector sin desplazar", "c": false}, {"text": "Reorganizar todo el vector para mantener el orden", "c": false}]}, {"text": "¿Cuál es la complejidad temporal de la operación borrar en la implementación de conjunto con array no ordenado?", "options": [{"text": "O(n) porque hay que encontrar el elemento, pero el borrado en sí es O(1) (sustituir por el último)", "c": true}, {"text": "O(1) siempre porque acceso directo al índice", "c": false}, {"text": "O(n²) por el doble recorrido necesario", "c": false}, {"text": "O(log n) con búsqueda binaria", "c": false}]}, {"text": "En la implementación de lista con punteros, ¿cómo se inserta un nodo al final con complejidad O(n)?", "options": [{"text": "Recorriendo la lista desde el inicio hasta el último nodo y enlazando el nuevo nodo", "c": true}, {"text": "Usando el puntero al inicio para insertar directamente al final", "c": false}, {"text": "Usando una tabla hash para localizar la posición final", "c": false}, {"text": "Reordenando todos los nodos del vector", "c": false}]}, {"text": "¿Cuál es la ventaja de la representación vectorial enlazada frente al vector secuencial para inserción?", "options": [{"text": "Reduce el coste de inserción/borrado a O(1) al evitar desplazamientos de elementos", "c": true}, {"text": "No requiere memoria adicional para los punteros", "c": false}, {"text": "Permite acceso aleatorio directo a cualquier posición", "c": false}, {"text": "Ocupa menos memoria que el vector secuencial", "c": false}]}, {"text": "¿Cuál es una aplicación práctica típica del TAD Cola?", "options": [{"text": "Simulación discreta (teoría de colas): decidir cuántos cajeros automáticos poner", "c": true}, {"text": "Evaluación de expresiones aritméticas con paréntesis", "c": false}, {"text": "Transformación de esquemas recursivos en iterativos", "c": false}, {"text": "Análisis sintáctico de programas con autómatas", "c": false}]}, {"text": "¿Qué tipo de implementación usa la Pila en memoria dinámica?", "options": [{"text": "Lista enlazada donde el puntero apunta siempre al elemento top (cima)", "c": true}, {"text": "Vector estático con índice top que va de 0 a N-1", "c": false}, {"text": "Lista doblemente enlazada para acceso bidireccional", "c": false}, {"text": "Array circular con dos punteros: top e inicio", "c": false}]}, {"text": "¿Cuáles son las aplicaciones del TAD Pila en informática?", "options": [{"text": "Gestión de retornos de subrutinas, funciones recursivas, análisis sintáctico", "c": true}, {"text": "Gestión de procesos en el planificador del SO, teoría de colas", "c": false}, {"text": "Indexación de bases de datos, búsqueda en tablas hash", "c": false}, {"text": "Representación de grafos y recorridos en anchura", "c": false}]}, {"text": "En la especificación semántica del TAD Cola, la notación c=e₁…eₙ con n=0 equivale a:", "options": [{"text": "Cola vacía (λ)", "c": true}, {"text": "Cola con un único elemento", "c": false}, {"text": "Cola cuyo primer elemento es e₀", "c": false}, {"text": "Cola circular completamente llena", "c": false}]}, {"text": "¿Cuál es la diferencia entre 'primero(c)' de la Cola y 'tope(p)' de la Pila?", "options": [{"text": "Ninguna conceptualmente: ambas devuelven el siguiente elemento a extraer sin eliminarlo", "c": true}, {"text": "primero(c) devuelve y elimina; tope(p) solo consulta", "c": false}, {"text": "tope(p) devuelve el elemento más antiguo; primero(c) el más reciente", "c": false}, {"text": "Son operaciones completamente distintas sin analogía", "c": false}]}, {"text": "Si una pila tiene los elementos [3, 7, 2] (con 2 en la cima), ¿cuál es el resultado de desapilar() y luego tope()?", "options": [{"text": "7", "c": true}, {"text": "3", "c": false}, {"text": "2", "c": false}, {"text": "La pila queda vacía después de desapilar", "c": false}], "exp": "Desapilar elimina el 2 (cima), quedando [3,7] con 7 en la cima. tope() devuelve 7."}, {"text": "¿Qué ventaja tienen las listas ordenadas para implementar el TAD Conjunto?", "options": [{"text": "Permiten parar antes en las búsquedas y hacen unión/intersección/diferencia en un único recorrido", "c": true}, {"text": "Reducen el uso de memoria a la mitad", "c": false}, {"text": "Eliminan la necesidad de comparar elementos", "c": false}, {"text": "Permiten acceso aleatorio en O(1)", "c": false}]}, {"text": "¿Qué tipo de lista es más adecuada para una lista ordenada donde a menudo se consultan predecesor y sucesor?", "options": [{"text": "Lista doblemente enlazada", "c": true}, {"text": "Lista simplemente enlazada", "c": false}, {"text": "Lista circular", "c": false}, {"text": "Vector secuencial", "c": false}]}, {"text": "En la implementación de Cola circular con vector, ¿cómo se actualiza el índice 'ultimo' al encolar?", "options": [{"text": "ultimo = (ultimo + 1) MOD N", "c": true}, {"text": "ultimo = ultimo + 1", "c": false}, {"text": "ultimo = (ultimo - 1) MOD N", "c": false}, {"text": "ultimo = N - ultimo", "c": false}]}, {"text": "¿Qué pasa si en la implementación de Pila con vector la variable 'top' es igual a N-1 y se intenta apilar?", "options": [{"text": "La pila está llena y la operación no puede realizarse (desbordamiento)", "c": true}, {"text": "Se redimensiona automáticamente el vector", "c": false}, {"text": "Se sobreescribe el elemento en la posición 0", "c": false}, {"text": "El índice top se reinicia a 0 de forma circular", "c": false}]}];
let qs=[],cur=0,ans=[];
const LB=['A','B','C','D'];
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function start(){
  qs=sh(ALL).map(q=>{
    const so=sh(q.options);
    return{...q,options:so};
  });
  ans=new Array(qs.length).fill(null);
  cur=0;
  document.getElementById('res').style.display='none';
  const qd=document.getElementById('quiz');
  qd.querySelectorAll('.card').forEach(c=>c.remove());
  qd.style.display='block';
  qs.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='card'+(qi===0?' on':'');
    card.id='c'+qi;
    let extra='';
    if(q.code)extra+=`<div class="code">${q.code}</div>`;
    card.innerHTML=`<div class="qt">${q.text}</div>${extra}<div class="opts" id="o${qi}">${
      q.options.map((op,oi)=>`<div class="opt" onclick="pick(${qi},${oi})" id="op${qi}_${oi}">
        <span class="ol">${LB[oi]}</span><span class="ot">${op.text}</span></div>`).join('')
    }</div><div class="fb" id="fb${qi}"></div>
    <div class="nav">
      <button class="btn" onclick="go(-1)" ${qi===0?'disabled':''}>Anterior</button>
      <span class="pg">${qi+1} / ${qs.length}</span>
      <button class="btn pr" onclick="go(1)">${qi===qs.length-1?'Ver resultado':'Siguiente'}</button>
    </div>`;
    qd.appendChild(card);
  });
  show(0);
}
function show(i){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c'+i);if(c){c.classList.add('on');cur=i;}
  document.getElementById('qc').textContent=`Pregunta ${i+1} de ${qs.length}`;
  document.getElementById('pb').style.width=((i+1)/qs.length*100)+'%';
}
function go(d){const n=cur+d;if(n<0)return;if(n>=qs.length){showRes();return;}show(n);}
function pick(qi,oi){
  if(ans[qi]!==null)return;
  ans[qi]=oi;
  const ci=qs[qi].options.findIndex(o=>o.c);
  if(oi===ci)beep(880,.32);else beep(240,.38);
  qs[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`op${qi}_${i}`);
    el.classList.add('done');
    if(i===ci)el.classList.add('ok');
    else if(i===oi)el.classList.add('bad');
    else el.classList.add('dim');
  });
  if(qs[qi].exp){const fb=document.getElementById('fb'+qi);fb.textContent=qs[qi].exp;fb.classList.add('on');}
}
function showRes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('res').style.display='block';
  let ok=0,ng=0;
  ans.forEach((a,i)=>{if(a===null)return;const ci=qs[i].options.findIndex(o=>o.c);if(a===ci)ok++;else ng++;});
  const tot=qs.length,pct=Math.round(ok/tot*100);
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('sok').textContent=ok;
  document.getElementById('sng').textContent=ng;
  document.getElementById('stot').textContent=tot;
  document.getElementById('rdesc').textContent=pct>=90?'¡Excelente! Dominas el tema.':pct>=70?'Buen resultado. Repasa los fallos.':pct>=50?'Aprobado justo. Sigue repasando.':'Hay que estudiar más. ¡Tú puedes!';
  setTimeout(()=>{document.getElementById('sc').style.strokeDashoffset=326.7-(pct/100)*326.7;},120);
  document.getElementById('pb').style.width='100%';
}
start();
</script>
</body>
</html>
