<!DOCTYPE html>

<head>

<title>Abstracciones y Especificaciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--sf:#f8f8f8;--br:#e4e4e4;--tx:#111;--mx:#777;--r:8px;--tr:160ms ease;
      --ok:#16a34a;--ok2:#f0fdf4;--ng:#dc2626;--ng2:#fef2f2}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
#pb{position:fixed;top:0;left:0;height:3px;background:#111;transition:width 400ms ease;z-index:100}
header{padding:2.5rem 2rem 1.4rem;border-bottom:1px solid var(--br);max-width:740px;margin:0 auto;width:100%}
.sub{font-size:.71rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mx);margin-bottom:.35rem}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
.bk{display:inline-block;margin-top:.55rem;font-size:.71rem;color:var(--mx);text-decoration:none;letter-spacing:.05em;text-transform:uppercase}
.bk:hover{color:var(--tx)}
main{max-width:740px;margin:0 auto;width:100%;padding:2rem;flex:1}
.qc{font-size:.74rem;color:var(--mx);letter-spacing:.04em;margin-bottom:1.25rem}
.card{display:none;animation:fi 200ms ease}.card.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.qt{font-size:1rem;line-height:1.7;font-weight:500;margin-bottom:1.25rem}
.code{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:.85rem 1rem;font-family:Consolas,monospace;font-size:.81rem;margin-bottom:1rem;line-height:1.55;overflow-x:auto;white-space:pre}
.opts{display:flex;flex-direction:column;gap:.5rem}
.opt{display:flex;align-items:flex-start;gap:.85rem;padding:.78rem 1rem;border:1px solid var(--br);border-radius:var(--r);cursor:pointer;transition:background var(--tr),border-color var(--tr)}
.opt:hover:not(.done){background:var(--sf);border-color:#bbb}
.ol{font-size:.69rem;font-weight:700;letter-spacing:.05em;min-width:16px;color:var(--mx);padding-top:2px;flex-shrink:0}
.ot{font-size:.9rem;line-height:1.5}
.opt.ok{background:var(--ok);border-color:var(--ok);color:#fff}.opt.ok .ol{color:rgba(255,255,255,.6)}
.opt.ng{background:var(--ng);border-color:var(--ng);color:#fff}.opt.ng .ol{color:rgba(255,255,255,.6)}
.opt.dim{opacity:.26;cursor:default}.opt.done{cursor:default}
.fb{display:none;margin-top:.8rem;font-size:.81rem;color:var(--mx);line-height:1.55;padding:.65rem 1rem;border-left:3px solid var(--br)}.fb.on{display:block}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.7rem;padding-top:1.3rem;border-top:1px solid var(--br)}
.pg{font-size:.74rem;color:var(--mx)}
.btn{padding:.48rem 1.2rem;font-size:.82rem;font-weight:600;border:1px solid #111;border-radius:var(--r);cursor:pointer;background:transparent;color:var(--tx);transition:background var(--tr),color var(--tr);letter-spacing:.02em}
.btn:hover{background:#111;color:#fff}.btn.pr{background:#111;color:#fff}.btn.pr:hover{opacity:.8}
.btn:disabled{opacity:.22;cursor:default}.btn:disabled:hover{background:transparent;color:var(--tx)}
#res{display:none;text-align:center;padding:3rem 0;animation:fi 400ms ease}
.ring{width:130px;height:130px;margin:0 auto 1.7rem}
.ring svg{transform:rotate(-90deg)}
.pct{font-size:2.3rem;font-weight:800;letter-spacing:-.04em;margin-bottom:.22rem}
.rdesc{font-size:.87rem;color:var(--mx);margin-bottom:1.9rem}
.stats{display:flex;justify-content:center;gap:2rem;margin-bottom:1.9rem;font-size:.81rem}
.sv{font-size:1.3rem;font-weight:700;display:block}.sl{color:var(--mx)}
.res-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:.55rem;margin-bottom:1rem}
#review{display:none}
.rev-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem;padding-bottom:.9rem;border-bottom:1px solid var(--br)}
.rev-title{font-size:1.05rem;font-weight:700}
.rq{margin-bottom:1.3rem;padding:1.15rem;border:1px solid var(--br);border-radius:10px;background:var(--sf)}
.rq-num{font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;color:var(--mx);margin-bottom:.35rem;display:flex;align-items:center;gap:.4rem}
.badge{padding:.12rem .45rem;border-radius:4px;font-size:.66rem;font-weight:700}
.badge.ok{background:var(--ok);color:#fff}.badge.ng{background:var(--ng);color:#fff}.badge.sk{background:#aaa;color:#fff}
.rq-text{font-size:.93rem;font-weight:500;line-height:1.65;margin-bottom:.85rem}
.rq-opt{display:flex;align-items:flex-start;gap:.7rem;padding:.48rem .7rem;border-radius:5px;font-size:.87rem;margin-bottom:.28rem;line-height:1.4}
.rq-opt.ok{background:var(--ok2);color:var(--ok);font-weight:600}
.rq-opt.ng{background:var(--ng2);color:var(--ng);font-weight:600}
.rq-exp{margin-top:.55rem;font-size:.79rem;color:var(--mx);line-height:1.5;padding:.55rem .7rem;border-left:3px solid var(--br)}
</style>
</head>

<div id="pb" style="width:0%"></div>
<header>
  <div class="sub">Estructuras de Datos — Tema 2</div>
  <h1>Abstracciones y Especificaciones</h1>

<main>

      <button class="btn" onclick="start()">Repetir test</button>
      <button class="btn" onclick="exportPDF()">Descargar PDF</button>
    </div>
    <a class="bk" href="index.html">← Índice</a>
  </div>
  <div id="review">

      <div style="display:flex;gap:.5rem">
        <button class="btn" onclick="exportPDF()">Descargar PDF</button>

      </div>
    </div>
    <div id="rev-body"></div>
  </div>

</main>
<script>
const ALL=[{"text": "¿Cuáles son las 4 propiedades que debe cumplir una especificación de un TAD?", "options": [{"text": "Precisa, general, legible y no ambigua", "c": true}, {"text": "Completa, correcta, consistente y minimal", "c": false}, {"text": "Formal, informal, abstracta y concreta", "c": false}, {"text": "Rápida, eficiente, ejecutable y compilable", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuáles son los dos grandes tipos de notaciones de especificación?", "options": [{"text": "Notaciones informales (lenguaje natural) y formales (algebraicas u operacionales)", "c": true}, {"text": "Formales, informales, semiformales y gráficas", "c": false}, {"text": "Algebraicas, operacionales, lógicas y funcionales", "c": false}, {"text": "Precondiciones, postcondiciones, axiomas y contratos", "c": false}], "d": 1, "t": 2}, {"text": "En la abstracción funcional informal, ¿qué indica la cláusula 'Requiere'?", "options": [{"text": "Las restricciones de uso que deben cumplirse para aplicar la operación", "c": true}, {"text": "El resultado que devuelve la operación", "c": false}, {"text": "Los datos de entrada que la operación modifica", "c": false}, {"text": "La descripción textual del comportamiento de la operación", "c": false}], "d": 1, "t": 2}, {"text": "En la abstracción funcional informal, ¿qué indica la cláusula 'Calcula'?", "options": [{"text": "La descripción textual del comportamiento de la operación", "c": true}, {"text": "Las restricciones previas de los parámetros de entrada", "c": false}, {"text": "Los parámetros de entrada que se modifican", "c": false}, {"text": "El tipo de retorno de la función", "c": false}], "d": 1, "t": 2}, {"text": "En la abstracción funcional informal, ¿qué indica la cláusula 'Modifica'?", "options": [{"text": "Los datos de entrada que la operación modifica", "c": true}, {"text": "Las condiciones previas necesarias para ejecutar la operación", "c": false}, {"text": "El valor calculado y devuelto por la operación", "c": false}, {"text": "Los parámetros formales de la función", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuál es la principal diferencia entre el método algebraico y el constructivo?", "options": [{"text": "El algebraico define el significado implícitamente mediante axiomas; el constructivo explícitamente mediante pre/postcondiciones", "c": true}, {"text": "El algebraico usa lógica de primer orden; el constructivo usa lenguaje natural", "c": false}, {"text": "El algebraico es más moderno y preciso que el constructivo", "c": false}, {"text": "El algebraico solo funciona para TADs lineales; el constructivo para árboles", "c": false}], "d": 1, "t": 2}, {"text": "¿Qué son los 'constructores' en el método algebraico?", "options": [{"text": "El conjunto mínimo de operaciones a partir del cual se puede obtener cualquier valor del tipo T", "c": true}, {"text": "Las operaciones que devuelven un valor de tipo diferente a T", "c": false}, {"text": "Las operaciones que modifican valores existentes del tipo T", "c": false}, {"text": "Los axiomas base que definen el TAD", "c": false}], "d": 1, "t": 2}, {"text": "¿Qué son las operaciones de 'consulta' en el método algebraico?", "options": [{"text": "Operaciones que devuelven un valor que NO es del tipo T", "c": true}, {"text": "Operaciones que crean instancias del tipo T desde cero", "c": false}, {"text": "Operaciones que transforman un valor de tipo T en otro de tipo T", "c": false}, {"text": "Operaciones que comparan dos valores del tipo T", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuáles son los constructores del TAD Natural en el método algebraico?", "options": [{"text": "cero y sucesor", "c": true}, {"text": "esCero e igual", "c": false}, {"text": "suma y producto", "c": false}, {"text": "sucesor e igual", "c": false}], "exp": "cero:→N y sucesor:N→N son los únicos constructores porque cualquier natural puede expresarse en términos de ellos.", "d": 2, "t": 2}, {"text": "¿Qué tipo de operación es 'suma' en el TAD Natural algebraico?", "options": [{"text": "Modificación (obtiene otro valor de tipo N pero no es constructor)", "c": true}, {"text": "Constructor (necesaria para construir cualquier natural)", "c": false}, {"text": "Consulta (devuelve un valor que no es de tipo N)", "c": false}, {"text": "Iterador (recorre los elementos del tipo)", "c": false}], "d": 1, "t": 2}, {"text": "¿Qué tipo de operación es 'esCero' en el TAD Natural algebraico?", "options": [{"text": "Consulta (devuelve un booleano, no un valor de tipo N)", "c": true}, {"text": "Constructor (permite construir valores naturales)", "c": false}, {"text": "Modificación (transforma valores del tipo N)", "c": false}, {"text": "Modificación (devuelve un natural transformado)", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuánto vale esVacía(crearPila) en la especificación algebraica del TAD Pila?", "options": [{"text": "true", "c": true}, {"text": "false", "c": false}, {"text": "crearPila", "c": false}, {"text": "Error", "c": false}], "exp": "Axioma 1: esVacía(crearPila) = true", "d": 2, "t": 2}, {"text": "¿Cuánto vale esVacía(push(t, s)) en la especificación algebraica?", "options": [{"text": "false", "c": true}, {"text": "true", "c": false}, {"text": "t", "c": false}, {"text": "s", "c": false}], "exp": "Axioma 2: esVacía(push(t,s)) = false — una pila con al menos un elemento nunca es vacía.", "d": 2, "t": 2}, {"text": "¿Cuánto vale pop(crearPila) en la especificación algebraica del TAD Pila?", "options": [{"text": "crearPila", "c": true}, {"text": "Error. La pila está vacía", "c": false}, {"text": "NULL", "c": false}, {"text": "false", "c": false}], "exp": "Axioma 3: pop(crearPila) = crearPila", "d": 2, "t": 2}, {"text": "¿Cuánto vale pop(push(t, s)) en la especificación algebraica?", "options": [{"text": "s", "c": true}, {"text": "t", "c": false}, {"text": "push(t, s)", "c": false}, {"text": "crearPila", "c": false}], "exp": "Axioma 4: pop(push(t,s)) = s — pop elimina el tope y devuelve el resto de la pila.", "d": 2, "t": 2}, {"text": "¿Cuánto vale tope(push(t, s)) en la especificación algebraica?", "options": [{"text": "t", "c": true}, {"text": "s", "c": false}, {"text": "push(t, s)", "c": false}, {"text": "Error. La pila está vacía", "c": false}], "exp": "Axioma 6: tope(push(t,s)) = t — el tope es el último elemento insertado.", "d": 2, "t": 2}, {"text": "¿Cuánto vale tope(crearPila) en la especificación algebraica?", "options": [{"text": "\"Error. La pila está vacía\"", "c": true}, {"text": "crearPila", "c": false}, {"text": "NULL", "c": false}, {"text": "false", "c": false}], "exp": "Axioma 5: tope(crearPila) = 'Error. La pila está vacía'", "d": 2, "t": 2}, {"text": "Calcula: tope(push(3, push(2, crearPila)))", "options": [{"text": "3", "c": true}, {"text": "2", "c": false}, {"text": "crearPila", "c": false}, {"text": "push(3, push(2, crearPila))", "c": false}], "code": "tope(push(3, push(2, crearPila)))", "exp": "tope(push(3,...)) = 3 por el axioma 6.", "d": 3, "t": 2}, {"text": "Calcula: pop(push(3, push(2, pop(crearPila))))", "options": [{"text": "push(2, crearPila)", "c": true}, {"text": "push(3, push(2, crearPila))", "c": false}, {"text": "crearPila", "c": false}, {"text": "push(2, pop(crearPila))", "c": false}], "code": "pop(push(3, push(2, pop(crearPila))))", "exp": "pop(crearPila)=crearPila → pop(push(3,push(2,crearPila)))=push(2,crearPila)", "d": 3, "t": 2}, {"text": "¿Qué dos propiedades deben cumplir los axiomas de una especificación algebraica?", "options": [{"text": "Completitud (suficientes para deducir cualquier expresión) y corrección (una expresión → un único resultado)", "c": true}, {"text": "Simplicidad y eficiencia computacional", "c": false}, {"text": "Abstracción y encapsulación de operaciones", "c": false}, {"text": "Recursividad y terminación garantizada", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuándo termina la ejecución de una expresión en el método algebraico?", "options": [{"text": "Cuando ya no se pueden aplicar más reglas (queda expresada en función de los constructores)", "c": true}, {"text": "Cuando se han aplicado todos los axiomas disponibles al menos una vez", "c": false}, {"text": "Cuando el resultado es un valor booleano", "c": false}, {"text": "Cuando la expresión tiene menos de 3 operaciones anidadas", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuál es la visión del 'implementador' en el contrato de una especificación?", "options": [{"text": "Obligación: cumplir la postcondición. Derecho: que se cumpla la precondición", "c": true}, {"text": "Obligación: cumplir la precondición. Derecho: que se cumpla la postcondición", "c": false}, {"text": "Debe garantizar la operación incluso si la precondición no se cumple", "c": false}, {"text": "No tiene ninguna obligación formal, solo derechos sobre los datos", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuál es la visión del 'usuario' en el contrato de una especificación?", "options": [{"text": "Obligación: cumplir la precondición. Derecho: que se cumpla la postcondición", "c": true}, {"text": "Obligación: cumplir la postcondición. Derecho: que se cumpla la precondición", "c": false}, {"text": "Puede llamar a la operación sin cumplir la precondición si conoce la implementación", "c": false}, {"text": "No tiene ninguna obligación si la operación lanza una excepción", "c": false}], "d": 1, "t": 2}, {"text": "Si no se cumple la precondición, ¿qué ocurre según el modelo de contrato?", "options": [{"text": "No se puede garantizar que se cumpla la postcondición", "c": true}, {"text": "La operación devuelve automáticamente un mensaje de error estándar", "c": false}, {"text": "El sistema lanza una excepción de tipo PreConditionError", "c": false}, {"text": "La operación se ejecuta pero devuelve un valor por defecto", "c": false}], "d": 1, "t": 2}, {"text": "En el método constructivo, ¿qué es la precondición?", "options": [{"text": "Relación que deben cumplir los datos de entrada para que la operación pueda aplicarse", "c": true}, {"text": "El resultado garantizado después de ejecutar la operación", "c": false}, {"text": "La descripción textual del comportamiento esperado", "c": false}, {"text": "El conjunto de axiomas que definen el TAD", "c": false}], "d": 1, "t": 2}, {"text": "En el método constructivo, ¿qué es la postcondición?", "options": [{"text": "Relaciones que se cumplen en los datos de salida después de ejecutar la operación", "c": true}, {"text": "Las restricciones que deben cumplir los datos de entrada", "c": false}, {"text": "El nombre y tipo de los parámetros formales", "c": false}, {"text": "La lista de efectos secundarios posibles de la operación", "c": false}], "d": 1, "t": 2}, {"text": "En la especificación constructiva del TAD Pila con Lista como modelo subyacente, ¿qué establece post-crearPila(s)?", "options": [{"text": "s = crearLista", "c": true}, {"text": "s = NULL", "c": false}, {"text": "s = push(s, crearLista)", "c": false}, {"text": "s = esListaVacía(s)", "c": false}], "d": 1, "t": 2}, {"text": "¿Cuál es la limitación principal de la especificación constructiva?", "options": [{"text": "Está limitada por la necesidad de modelos subyacentes para definir las operaciones", "c": true}, {"text": "No puede definir TADs genéricos con parámetros de tipo", "c": false}, {"text": "Solo funciona para TADs con un número fijo de operaciones", "c": false}, {"text": "No puede expresar precondiciones con múltiples condiciones lógicas", "c": false}], "d": 1, "t": 2}, {"text": "¿Para qué sirve la parametrización de tipo en la especificación informal de datos?", "options": [{"text": "Para definir contenedores genéricos como Lista[T] en lugar de ListaEnteros, ListaCadenas, etc.", "c": true}, {"text": "Para ocultar los detalles de implementación del TAD", "c": false}, {"text": "Para especificar las precondiciones de las operaciones", "c": false}, {"text": "Para generar instancias concretas del TAD automáticamente", "c": false}], "d": 1, "t": 2}, {"text": "¿Qué es una abstracción de iteradores?", "options": [{"text": "Un mecanismo que define un recorri const QUIZ_TITLE="Abstracciones y Especificaciones";

const AC=window.AudioContext||window.webkitAudioContext;let _ax=null;
function ga(){if(!_ax)_ax=new AC();return _ax;}
function beep(f,d){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.14,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const LB=['A','B','C','D'];
let qs=[],cur=0,ans=[];

function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function start(pool){
  pool=pool||ALL;
  qs=sh(pool).map(q=>({...q,options:sh(q.options)}));
  ans=new Array(qs.length).fill(null);
  cur=0;
  document.getElementById('res').style.display='none';
  document.getElementById('review').style.display='none';
  const qd=document.getElementById('quiz');
  qd.querySelectorAll('.card').forEach(c=>c.remove());
  qd.style.display='block';
  qs.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='card'+(qi===0?' on':'');
    card.id='c'+qi;
    let extra='';
    if(q.code)extra=`<div class="code">${q.code}</div>`;
    card.innerHTML=`<div class="qt">${q.text}</div>${extra}
<div class="opts" id="o${qi}">${q.options.map((op,oi)=>
  `<div class="opt" onclick="pick(${qi},${oi})" id="op${qi}_${oi}">
   <span class="ol">${LB[oi]}</span><span class="ot">${op.text}</span></div>`).join('')}
</div><div class="fb" id="fb${qi}"></div>
<div class="nav">
  <button class="btn" onclick="go(-1)"${qi===0?' disabled':''}>Anterior</button>
  <span class="pg">${qi+1} / ${qs.length}</span>
  <button class="btn pr" onclick="go(1)">${qi===qs.length-1?'Ver resultado':'Siguiente'}</button>
</div>`;
    qd.appendChild(card);
  });
  show(0);
}

function show(i){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const c=document.getElementById('c'+i);if(c){c.classList.add('on');cur=i;}
  document.getElementById('qc').textContent=`Pregunta ${i+1} de ${qs.length}`;
  document.getElementById('pb').style.width=((i+1)/qs.length*100)+'%';
}

function go(d){const n=cur+d;if(n<0)return;if(n>=qs.length){showRes();return;}show(n);}

function pick(qi,oi){
  if(ans[qi]!==null)return;
  ans[qi]=oi;
  const ci=qs[qi].options.findIndex(o=>o.c);
  if(oi===ci)beep(880,.3);else beep(240,.38);
  qs[qi].options.forEach((_,i)=>{
    const el=document.getElementById(`op${qi}_${i}`);
    el.classList.add('done');
    if(i===ci)el.classList.add('ok');
    else if(i===oi)el.classList.add('ng');
    else el.classList.add('dim');
  });
  if(qs[qi].exp){const fb=document.getElementById('fb'+qi);fb.textContent=qs[qi].exp;fb.classList.add('on');}
}

function calcScore(){
  let ok=0,ng=0,sk=0;
  ans.forEach((a,i)=>{if(a===null){sk++;return;}const ci=qs[i].options.findIndex(o=>o.c);if(a===ci)ok++;else ng++;});
  return{ok,ng,sk,tot:qs.length,pct:Math.round(ok/qs.length*100)};
}

function showRes(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('review').style.display='none';
  document.getElementById('res').style.display='block';
  const{ok,ng,sk,tot,pct}=calcScore();
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('sok').textContent=ok;
  document.getElementById('sng').textContent=ng;
  document.getElementById('sskip').textContent=sk;
  const desc=pct>=90?'¡Excelente! Dominas el tema.':pct>=70?'Buen resultado. Repasa los fallos.':pct>=50?'Aprobado justo. Sigue repasando.':'Hay que estudiar más. ¡Tú puedes!';
  document.getElementById('rdesc').textContent=desc;
  setTimeout(()=>{document.getElementById('sc').style.strokeDashoffset=326.7-(pct/100)*326.7;},120);
  document.getElementById('pb').style.width='100%';
}

function backToResults(){document.getElementById('review').style.display='none';document.getElementById('res').style.display='block';}

function startReview(){
  document.getElementById('res').style.display='none';
  document.getElementById('review').style.display='block';
  const body=document.getElementById('rev-body');
  body.innerHTML='';
  qs.forEach((q,qi)=>{
    const ci=q.options.findIndex(o=>o.c),ua=ans[qi];
    const st=ua===null?'sk':ua===ci?'ok':'ng';
    const bl=st==='ok'?'✓ Correcta':st==='ng'?'✗ Incorrecta':'Sin responder';
    let h=`<div class="rq">
<div class="rq-num">Pregunta ${qi+1} <span class="badge ${st}">${bl}</span></div>
<div class="rq-text">${q.text}</div>`;
    if(q.code)h+=`<div class="code">${q.code}</div>`;
    q.options.forEach((op,oi)=>{
      const cls=oi===ci?' ok':oi===ua?' ng':'';
      const mk=oi===ci?' ✓':oi===ua?' ✗':'';
      h+=`<div class="rq-opt${cls}"><span style="font-weight:700;min-width:20px">${LB[oi]})</span><span>${op.text}${mk}</span></div>`;
    });
    if(q.exp)h+=`<div class="rq-exp">💡 ${q.exp}</div>`;
    h+='</div>';
    body.innerHTML+=h;
  });
  window.scrollTo(0,0);
}

function exportPDF(){
  const{ok,tot,pct}=calcScore();
  let h=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Revisión</title><style>
body{font-family:Arial,sans-serif;font-size:11.5pt;color:#111;max-width:680px;margin:36px auto;padding:0 18px}
h1{font-size:16pt;margin-bottom:3px}
.meta{color:#555;font-size:10pt;margin-bottom:22px;padding-bottom:10px;border-bottom:1px solid #ddd}
.q{margin-bottom:18px;padding:10px 12px;border:1px solid #ddd;border-radius:6px;page-break-inside:avoid}
.qn{font-size:8.5pt;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.qt{font-weight:600;margin-bottom:7px;line-height:1.5}
.qcode{background:#f5f5f5;border:1px solid #ddd;padding:7px 9px;font-family:Consolas,monospace;font-size:9.5pt;margin-bottom:7px;white-space:pre-wrap}
.op{padding:2px 5px;margin-bottom:2px;border-radius:3px;font-size:10.5pt;line-height:1.4}
.op.ok{background:#f0fdf4;color:#166534;font-weight:600}
.op.ng{background:#fef2f2;color:#991b1b;font-weight:600}
.exp{margin-top:5px;font-size:9pt;color:#555;padding:4px 7px;border-left:3px solid #ddd}
@page{margin:1.5cm}
</style></head><body>
<h1>${QUIZ_TITLE}</h1>
<div class="meta">Resultado: ${ok}/${tot} correctas · ${pct}% · Revisión completa</div>`;
  qs.forEach((q,qi)=>{
    const ci=q.options.findIndex(o=>o.c),ua=ans[qi];
    const st=ua===null?'Sin responder':ua===ci?'✓ Correcta':'✗ Incorrecta';
    h+=`<div class="q"><div class="qn">Pregunta ${qi+1} — ${st}</div><div class="qt">${q.text}</div>`;
    if(q.code)h+=`<div class="qcode">${q.code}</div>`;
    q.options.forEach((op,oi)=>{
      const cls=oi===ci?' ok':oi===ua?' ng':'';
      const mk=oi===ci?' ✓':oi===ua?' ✗':'';
      h+=`<div class="op${cls}">${LB[oi]}) ${op.text}${mk}</div>`;
    });
    if(q.exp)h+=`<div class="exp">💡 ${q.exp}</div>`;
    h+='</div>';
  });
  h+='</body></html>';
  const w=window.open('','_blank');
  w.document.write(h);w.document.close();
  setTimeout(()=>w.print(),450);
}

start();
</script>
</body></html>
